<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GA 프로모션 ON AX 대시보드</title>
    <style>
      :root {
        --brand-950: #0a2a66;
        --brand-900: #10387e;
        --brand-700: #1a57b8;
        --brand-500: #4d8dff;
        --ink-900: #13233f;
        --ink-700: #41506c;
        --ink-500: #697997;
        --line: #d8e1f0;
        --surface: #f3f7fd;
        --card: #ffffff;
        --success: #18a957;
        --warning: #f1b80b;
        --danger: #da3848;
        --shadow: 0 18px 42px rgba(14, 34, 73, 0.12);
        --radius-xl: 28px;
        --radius-lg: 20px;
        --radius-md: 14px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Malgun Gothic", sans-serif;
        color: var(--ink-900);
        background:
          radial-gradient(circle at top right, rgba(77, 141, 255, 0.24), transparent 20rem),
          linear-gradient(180deg, #eef4ff 0%, var(--surface) 100%);
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app-shell {
        min-height: 100vh;
      }

      .screen {
        min-height: 100vh;
      }

      .login-screen {
        display: grid;
        place-items: center;
        padding: 36px 28px;
      }

      .login-layout {
        width: min(1100px, 100%);
        display: grid;
        grid-template-columns: minmax(0, 1.05fr) minmax(360px, 0.82fr);
        gap: 28px;
      }

      .hero-panel,
      .login-card,
      .dashboard-card,
      .panel {
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.75);
        box-shadow: var(--shadow);
      }

      .hero-panel {
        position: relative;
        overflow: hidden;
        border-radius: 36px;
        padding: 54px 48px;
        background:
          radial-gradient(circle at 18% 22%, rgba(255, 255, 255, 0.18), transparent 22rem),
          linear-gradient(145deg, rgba(8, 38, 95, 0.98), rgba(20, 94, 178, 0.92));
        color: #fff;
      }

      .hero-panel::before,
      .hero-panel::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
      }

      .hero-panel::before {
        width: 260px;
        height: 260px;
        top: -72px;
        right: -72px;
      }

      .hero-panel::after {
        width: 180px;
        height: 180px;
        bottom: -56px;
        left: -56px;
      }

      .brand-badge {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      .brand-badge::before {
        content: "";
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: #fff;
        box-shadow: 18px 0 0 rgba(255, 255, 255, 0.5);
      }

      .hero-title {
        position: relative;
        margin: 28px 0 18px;
        font-size: clamp(38px, 5vw, 58px);
        line-height: 1.04;
        letter-spacing: -0.03em;
      }

      .hero-copy {
        position: relative;
        margin: 0;
        max-width: 520px;
        color: rgba(255, 255, 255, 0.82);
        font-size: 18px;
        line-height: 1.75;
      }

      .hero-note-list {
        position: relative;
        display: grid;
        gap: 12px;
        margin-top: 34px;
        max-width: 470px;
      }

      .hero-note-item {
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 56px;
        padding: 14px 18px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(10px);
        color: rgba(255, 255, 255, 0.9);
        font-size: 15px;
        line-height: 1.55;
      }

      .hero-note-item::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #ffffff;
        box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.18);
        flex: 0 0 auto;
      }

      .login-card {
        position: relative;
        border-radius: 36px;
        padding: 38px 34px 34px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.99), rgba(245, 249, 255, 0.98));
      }

      .login-card::before {
        content: "";
        position: absolute;
        inset: 0 auto auto 0;
        width: 100%;
        height: 6px;
        border-radius: 36px 36px 0 0;
        background: linear-gradient(90deg, var(--brand-900), #3e8dff);
      }

      .card-label {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 999px;
        background: #eef4ff;
        color: var(--brand-900);
        font-size: 12px;
        font-weight: 700;
      }

      .login-card h2 {
        margin: 16px 0 8px;
        font-size: 34px;
        letter-spacing: -0.02em;
      }

      .login-card p {
        margin: 0 0 20px;
        color: var(--ink-700);
        line-height: 1.6;
      }

      .login-intro {
        font-size: 15px;
      }

      .field-group {
        display: grid;
        gap: 8px;
        margin-top: 18px;
      }

      .field-group label {
        font-size: 14px;
        font-weight: 700;
      }

      .field {
        width: 100%;
        height: 58px;
        padding: 0 18px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: #fcfdff;
        color: var(--ink-900);
      }

      .field:focus {
        outline: 2px solid rgba(77, 141, 255, 0.28);
        border-color: var(--brand-500);
      }

      .button-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 24px;
        justify-content: center;
      }

      .primary-button,
      .secondary-button,
      .ghost-button,
      .status-button {
        border: 0;
        cursor: pointer;
        transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      }

      .primary-button:hover,
      .secondary-button:hover,
      .ghost-button:hover,
      .status-button:hover {
        transform: translateY(-1px);
      }

      .primary-button {
        min-width: 150px;
        height: 52px;
        padding: 0 18px;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--brand-900), var(--brand-700));
        color: #fff;
        box-shadow: 0 12px 24px rgba(18, 70, 150, 0.22);
      }

      .secondary-button,
      .ghost-button {
        min-width: 150px;
        height: 52px;
        padding: 0 18px;
        border-radius: 14px;
        background: #eff4fb;
        color: var(--brand-900);
      }

      .helper-box {
        margin-top: 24px;
        padding: 20px;
        border-radius: 20px;
        background: linear-gradient(180deg, #f7faff, #eef4fd);
        border: 1px solid #e1eaf7;
      }

      .helper-box h3 {
        margin: 0 0 12px;
        font-size: 14px;
      }

      .helper-box p {
        margin: 6px 0;
        font-size: 14px;
      }

      .login-subcopy {
        display: block;
        margin-top: 8px;
        color: var(--ink-500);
        font-size: 13px;
      }

      .error-text {
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(218, 56, 72, 0.1);
        color: #ba2332;
        font-size: 14px;
      }

      .dashboard-screen {
        padding: 24px;
      }

      .dashboard-shell {
        width: min(1400px, 100%);
        margin: 0 auto;
        display: grid;
        gap: 20px;
      }

      .dashboard-card,
      .panel {
        border-radius: var(--radius-xl);
      }

      .dashboard-card {
        padding: 30px 32px;
      }

      .dashboard-header {
        display: grid;
        gap: 22px;
        background:
          linear-gradient(135deg, rgba(10, 42, 102, 0.98), rgba(18, 89, 177, 0.92)),
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0));
        color: #fff;
      }

      .header-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
      }

      .header-titleblock {
        max-width: 860px;
      }

      .dashboard-header h1 {
        margin: 10px 0 0;
        font-size: clamp(36px, 4.6vw, 52px);
        line-height: 1.04;
        white-space: nowrap;
        letter-spacing: -0.03em;
      }

      .header-subtitles {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 16px;
      }

      .header-subtitle {
        display: inline-flex;
        align-items: center;
        min-height: 40px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        font-size: 14px;
        font-weight: 700;
      }

      .header-copy {
        margin: 12px 0 0;
        max-width: 740px;
        color: rgba(255, 255, 255, 0.82);
        line-height: 1.6;
      }

      .header-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .month-tabs {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .month-tab {
        min-width: 92px;
        height: 42px;
        padding: 0 14px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.84);
        cursor: pointer;
        transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease;
      }

      .month-tab:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.14);
      }

      .month-tab.active {
        background: #fff;
        color: var(--brand-900);
        font-weight: 700;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      .summary-card {
        padding: 22px 20px;
        border-radius: 22px;
        background: linear-gradient(180deg, #ffffff, #f8fbff);
        border: 1px solid #e4ebf6;
      }

      .summary-card span {
        display: block;
        font-size: 13px;
        color: var(--ink-500);
      }

      .summary-card strong {
        display: block;
        margin-top: 8px;
        font-size: 30px;
        color: var(--brand-950);
      }

      .content-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.65fr) minmax(320px, 0.95fr);
        gap: 20px;
      }

      .stack-section {
        display: grid;
        gap: 20px;
      }

      .dashboard-board {
        display: grid;
        grid-template-columns: 1.15fr 0.95fr;
        gap: 20px;
      }

      .board-card {
        padding: 24px;
        border-radius: 24px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(244, 248, 255, 0.98));
        border: 1px solid #e4ebf6;
      }

      .board-card h2,
      .board-card h3 {
        margin: 0;
      }

      .board-card p {
        margin: 10px 0 0;
        color: var(--ink-700);
        line-height: 1.6;
      }

      .board-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }

      .board-stat {
        padding: 18px;
        border-radius: 20px;
        background: #fff;
        border: 1px solid #e7edf8;
      }

      .board-stat span {
        display: block;
        font-size: 12px;
        color: var(--ink-500);
      }

      .board-stat strong {
        display: block;
        margin-top: 8px;
        font-size: 26px;
        color: var(--brand-950);
      }

      .board-stat em {
        display: block;
        margin-top: 6px;
        font-style: normal;
        color: var(--ink-700);
        font-size: 13px;
      }

      .timeline-list {
        display: grid;
        gap: 12px;
        margin-top: 18px;
        max-height: 338px;
        overflow-y: auto;
        padding-right: 6px;
      }

      .timeline-item {
        display: grid;
        grid-template-columns: 92px 1fr;
        gap: 14px;
        align-items: start;
        padding: 14px 16px;
        border-radius: 18px;
        background: #fff;
        border: 1px solid #e7edf8;
      }

      .timeline-time {
        color: var(--brand-900);
        font-size: 12px;
        font-weight: 700;
      }

      .timeline-body strong {
        display: block;
        font-size: 14px;
      }

      .timeline-body span {
        display: block;
        margin-top: 4px;
        color: var(--ink-500);
        font-size: 12px;
      }

      .panel {
        padding: 24px;
      }

      .panel-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 18px;
      }

      .panel-head h2 {
        margin: 0;
        font-size: 22px;
      }

      .panel-head p {
        margin: 8px 0 0;
        color: var(--ink-700);
        line-height: 1.6;
      }

      .panel-role-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 108px;
        height: 36px;
        padding: 0 14px;
        border-radius: 999px;
        background: #edf3ff;
        color: var(--brand-900);
        font-size: 13px;
        font-weight: 700;
      }

      .filter-stack {
        display: grid;
        gap: 12px;
        margin-bottom: 18px;
      }

      .search-filter-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1.15fr) 110px;
        gap: 12px;
        align-items: end;
      }

      .search-filter-field {
        display: grid;
        gap: 8px;
      }

      .search-filter-field label {
        color: var(--ink-700);
        font-size: 14px;
        font-weight: 700;
      }

      .search-filter-control {
        width: 100%;
        height: 56px;
        padding: 0 18px;
        border: 1px solid #dbe5f3;
        border-radius: 18px;
        background: #fff;
        color: var(--brand-950);
        font-size: 15px;
        font-weight: 700;
      }

      .search-filter-button {
        width: 100%;
        height: 56px;
        border: 0;
        border-radius: 18px;
        background: #243f81;
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
      }

      .filter-helper-row {
        display: flex;
        justify-content: flex-end;
      }

      .search-filter-toggle {
        width: 220px;
        height: 56px;
        border: 1px solid #dbe5f3;
        border-radius: 18px;
        background: #fff;
        color: var(--brand-900);
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }

      .table-wrap {
        overflow: auto;
        max-height: 560px;
        border: 1px solid #e4ebf6;
        border-radius: 18px;
        scrollbar-width: auto;
        scrollbar-color: #9db0d8 #eef3fb;
      }

      .table-wrap::-webkit-scrollbar {
        width: 12px;
        height: 12px;
      }

      .table-wrap::-webkit-scrollbar-track {
        background: #eef3fb;
        border-radius: 999px;
      }

      .table-wrap::-webkit-scrollbar-thumb {
        background: #9db0d8;
        border-radius: 999px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 980px;
        background: #fff;
      }

      thead {
        background: #f7faff;
      }

      th,
      td {
        padding: 16px 14px;
        border-bottom: 1px solid #edf2fa;
        text-align: left;
        font-size: 14px;
        vertical-align: middle;
      }

      th {
        color: var(--ink-700);
        font-weight: 700;
        position: sticky;
        top: 0;
        z-index: 1;
        background: #f7faff;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      .agency-cell strong,
      .file-list strong {
        display: block;
      }

      .agency-cell span,
      .file-list span,
      .mini-note {
        display: block;
        margin-top: 4px;
        font-size: 12px;
        color: var(--ink-500);
      }

      .sort-header-button {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 0;
        background: transparent;
        color: var(--ink-700);
        font-size: 14px;
        font-weight: 700;
        padding: 0;
        cursor: pointer;
      }

      .sort-header-button.active {
        color: var(--brand-900);
      }

      .traffic {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        border-radius: 999px;
        font-weight: 700;
        font-size: 13px;
      }

      .traffic::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 999px;
      }

      .traffic.confirmed {
        background: rgba(24, 169, 87, 0.1);
        color: #127841;
      }

      .traffic.confirmed::before {
        background: var(--success);
        box-shadow: 0 0 0 5px rgba(24, 169, 87, 0.14);
      }

      .traffic.pending {
        background: rgba(241, 184, 11, 0.14);
        color: #8b6905;
      }

      .traffic.pending::before {
        background: var(--warning);
        box-shadow: 0 0 0 5px rgba(241, 184, 11, 0.14);
      }

      .traffic.error,
      .traffic.rejected {
        background: rgba(218, 56, 72, 0.12);
        color: #a61f2d;
      }

      .traffic.error::before,
      .traffic.rejected::before {
        background: var(--danger);
        box-shadow: 0 0 0 5px rgba(218, 56, 72, 0.14);
      }

      .status-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .status-button {
        height: 34px;
        padding: 0 12px;
        border-radius: 10px;
        background: #eff4fb;
        color: var(--brand-950);
      }

      .download-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 132px;
        padding: 9px 12px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 700;
        background: #edf3fc;
        color: var(--ink-700);
      }

      .download-chip.active {
        background: rgba(16, 56, 126, 0.12);
        color: var(--brand-950);
      }

      .notice-links {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .notice-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 72px;
        height: 34px;
        padding: 0 12px;
        border: 1px solid #d7e2f4;
        border-radius: 999px;
        background: #f8fbff;
        color: var(--brand-900);
        font-size: 12px;
        font-weight: 700;
        text-decoration: none;
      }

      .notice-link.disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .side-stack {
        display: grid;
        gap: 20px;
      }

      .role-card {
        padding: 20px;
        border-radius: 22px;
        background: linear-gradient(180deg, #f9fbff, #f2f7ff);
        border: 1px solid #dfebfb;
      }

      .role-card h3,
      .file-panel h3 {
        margin: 0;
        font-size: 18px;
      }

      .role-card p,
      .file-panel p {
        margin: 10px 0 0;
        color: var(--ink-700);
        line-height: 1.6;
      }

      .bullet-list {
        display: grid;
        gap: 10px;
        margin-top: 18px;
      }

      .bullet-item {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        color: var(--ink-700);
        font-size: 14px;
        line-height: 1.55;
      }

      .bullet-item::before {
        content: "";
        width: 8px;
        height: 8px;
        margin-top: 7px;
        border-radius: 999px;
        background: var(--brand-500);
        flex: 0 0 auto;
      }

      .file-panel {
        padding: 22px;
        border-radius: 22px;
        background: #fff;
        border: 1px solid #e4ebf6;
      }

      .button-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
      }

      .resource-room {
        padding: 8px 0 4px;
      }

      .resource-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .resource-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 20px 22px;
        border-radius: 22px;
        background: #fff;
        border: 1px solid #e3e9f3;
        box-shadow: 0 10px 26px rgba(14, 34, 73, 0.04);
      }

      .resource-card strong {
        display: block;
        font-size: 16px;
        color: var(--brand-950);
      }

      .resource-card span {
        display: block;
        margin-top: 6px;
        color: var(--ink-500);
        font-size: 13px;
      }

      .resource-button {
        min-width: 100px;
        height: 44px;
        padding: 0 18px;
        border: 1px solid #d5dff1;
        border-radius: 999px;
        background: #fff;
        color: var(--brand-900);
        font-weight: 700;
        text-decoration: none;
      }

      .resource-button:disabled {
        background: #eef3fb;
        color: #8a97ae;
        cursor: not-allowed;
      }

      .file-box {
        margin-top: 18px;
        padding: 16px;
        border-radius: 16px;
        background: #f6f9ff;
        border: 1px dashed #c9d8f1;
      }

      .file-list {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }

      .file-item {
        padding: 14px 16px;
        border-radius: 16px;
        background: #f9fbff;
        border: 1px solid #e7edf8;
      }

      .meta-bar {
        display: flex;

      const monthOptions = ["2026.06", "2026.05", "2026.04", "2026.03", "2026.02", "2026.01"];

      function simpleText(value) {
        return String(value ?? "").replace(/\r/g, " ").replace(/\n/g, " ").trim();
      }

      function dedupeUsersByEmployeeId(list) {
        const lookup = new Map();
        list.forEach((user) => {
          if (!user || !user.employeeId) return;
          lookup.set(user.employeeId, user);
        });
        return [...lookup.values()];
      }

      function normalizeRoleValue(value) {
        const text = simpleText(value).toLowerCase();
        if (!text) return "hq";
        if (text.includes("영업") || text.includes("지점") || text === "branch") return "branch";
        if (text.includes("본사") || text === "hq") return "hq";
        if (text === "영업관리자") return "branch";
        if (text === "본사담당자") return "hq";
        if (text.includes("관리자")) return "hq";
        return "hq";
      }

      function normalizeLoginUserRecord(raw) {
        const employeeId = simpleText(raw.employeeId || raw["사번"] || raw["임직원번호"] || raw["직원번호"]);
        if (!/^\d{5}$/.test(employeeId)) return null;
        const role = normalizeRoleValue(raw.role || raw["권한"] || raw["역할"] || raw["구분"]);

        return {
          employeeId,
          name: simpleText(raw.name || raw["이름"] || raw["성명"] || raw["담당자명"]) || `${role === "hq" ? "본사담당자" : "영업관리자"} ${employeeId}`,
          role,
          org: simpleText(raw.org || raw["조직"] || raw["부서"] || raw["소속"] || raw["본부"]) || (role === "hq" ? "본사" : "지점")
        };
      }

      function loadStoredLoginUsers() {
        try {
          const saved = window.localStorage.getItem(LOGIN_USER_STORAGE_KEY);
          if (!saved) return [];
          const parsed = JSON.parse(saved);
          if (!Array.isArray(parsed)) return [];
          return dedupeUsersByEmployeeId(parsed.map(normalizeLoginUserRecord).filter(Boolean));
        } catch (error) {
          console.error("권한 사번 목록 로드 실패", error);
          return [];
        }
      }

      function loadStoredLoginUsersUpdatedAt() {
        try {
          return window.localStorage.getItem(LOGIN_USER_UPDATED_AT_STORAGE_KEY) || "";

          return "";

        if (statusKey === "confirmed") return "확정";

        return "미확정";
      }

      function normalizeMonthValue(value) {
        if (!value) return "2026.06";
        const text = String(value);
        const match = text.match(/(20\d{2})\D?(\d{1,2})/);
        if (!match) return "2026.06";
        return `${match[1]}.${match[2].padStart(2, "0")}`;
      }

      function normalizePromotion(item, index) {
        const id = item.id ?? index + 1;
        const month = normalizeMonthValue(item.month || item.updatedAt);
        const status = item.status || statusFromKey(item.statusKey);

        return {
          ...item,
          id,
          agency: item.agency || `대리점 ${id}`,
          region: item.region || item.branch || "미지정",

        previewItemId: null,
        showTemplatePreview: false,
        showAdminPreviewList: false,
        uploadedAgencyStatusFileName: "업로드 전",
        uploadedAgencyStatusUrl: "",
        uploadedAgencyStatusUpdatedAt: "",
        uploadedRefundFileName: "업로드 전",
        uploadedRefundUrl: "",
        uploadedRefundUpdatedAt: ""
      };

      function getStatusClass(status) {
        if (status === "확정") return "confirmed";
        if (status === "오류") return "error";
        return "pending";
      }

      function getSummary(data) {
        return {
          total: data.length,
          confirmed: data.filter((item) => item.status === "확정").length,
          pending: data.filter((item) => item.status === "미확정").length,
          error: data.filter((item) => item.status === "오류").length,
          updatedToday: data.filter((item) => item.updatedAt.startsWith("2026-06-16")).length
        };
      }

      function getNowStamp() {
        const now = new Date();
        const pad = (value) => String(value).padStart(2, "0");
        return `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
      }

      function canGenerateItem(item) {
        return item.status === "확정" && Boolean(state.templateForms[item.id]);
      }

      function isDownloadEnabled(item) {
        return item.status === "확정" && item.generated && Boolean(state.approvedAt);
      }

      function canOpenImagePreview(item) {
        return item.status === "확정" && item.generated && Boolean(state.approvedAt) && Boolean(state.templateForms[item.id]);
      }

      }

      function getPreviewItem() {
        return state.promotions.find((item) => item.id === state.previewItemId) || null;
      }

      function getAllLoginUsers() {
        return dedupeUsersByEmployeeId([
          ...DEFAULT_HQ_USERS,
          ...DEFAULT_BRANCH_USERS,
          ...state.uploadedLoginUsers
        ]);
      }

      function getPreviewTemplateData() {
        if (!state.previewItemId) return null;
        return state.templateForms[state.previewItemId] || null;
      }

      function getBaseTemplateData() {
        const createInitialFormData = window.PromoTemplateData?.createInitialFormData;
        return createInitialFormData ? createInitialFormData() : null;
      }

      function getActiveTemplateData() {
        const previewData = getPreviewTemplateData();
        if (previewData) return previewData;

        const firstTemplateItem = state.promotions.find((item) => state.templateForms[item.id]);
        return firstTemplateItem ? state.templateForms[firstTemplateItem.id] : getBaseTemplateData();
      }

      function splitTemplateList(value) {
        return String(value || "")
          .split(",")
          .map((item) => normalizeCellText(item))
          .filter(Boolean);
      }

      function splitTemplateRows(value) {
        return String(value || "")
          .split(/\n+/)
          .map((row) => normalizeCellText(row))
          .filter(Boolean);
      }

      function splitTemplateRowCells(rowText) {
        const separator = rowText.includes("|") ? "|" : ",";
        return rowText
          .split(separator)
          .map((cell) => normalizeCellText(cell))
          .filter((cell, index, array) => cell || index < array.length - 1);
      }

      function splitFooterLines(value) {
        return String(value || "")
          .split("/")
          .map((line) => normalizeCellText(line))
          .filter(Boolean)
          .slice(0, 3);
      }

      function wrapSvgLine(text, maxChars = 34) {
        const source = normalizeCellText(text);
        if (!source) return [];
        if (source.length <= maxChars) return [source];

        const words = source.split(" ");
        if (words.length === 1) {
          const lines = [];
          for (let index = 0; index < source.length; index += maxChars) {
            lines.push(source.slice(index, index + maxChars));
          }
          return lines;
        }

        const lines = [];
        let current = "";
        words.forEach((word) => {
          const next = current ? `${current} ${word}` : word;
          if (next.length <= maxChars) {
            current = next;
            return;
          }
          if (current) lines.push(current);
          current = word;
        });
        if (current) lines.push(current);
        return lines;
      }

      function renderSvgMultiline(text, x, y, options = {}) {
        const lines = Array.isArray(text) ? text : wrapSvgLine(text, options.maxChars || 34);
        const fontSize = options.fontSize || 22;
        const lineHeight = options.lineHeight || fontSize + 10;
        const fill = options.fill || "#17324d";
        const fontWeight = options.fontWeight || 400;
        const anchor = options.anchor || "start";
        const family = "Malgun Gothic, Segoe UI, sans-serif";

        return lines.map((line, index) => `
          <text
            x="${x}"
            y="${y + (index * lineHeight)}"
            text-anchor="${anchor}"
            font-size="${fontSize}"
            font-family="${family}"
            fill="${fill}"
            font-weight="${fontWeight}"
          >${escapeSvgText(line)}</text>
        `).join("");
      }

      function buildTemplateSections(templateData) {
        return [1, 2, 3, 4]
          .map((index) => {
            const title = normalizeCellText(templateData[`section${index}Title`]);
            const round = normalizeCellText(templateData[`section${index}Round`]);
            const max = normalizeCellText(templateData[`section${index}Max`]);
            const headers = splitTemplateList(templateData[`section${index}Headers`]);
            const rows = splitTemplateRows(templateData[`section${index}Rows`]).map(splitTemplateRowCells);
            const note = normalizeCellText(templateData[`section${index}Note`]);
            if (!title && !headers.length && !rows.length) return null;
            return { title, round, max, headers, rows, note, index };
          })
          .filter(Boolean);
      }

      function buildTemplatePreviewSvg(templateData) {
        const data = templateData || getBaseTemplateData() || {};
        const sections = buildTemplateSections(data);
        const footerLines = splitFooterLines(data.footerBanner);
        let cursorY = 212;

        const sectionMarkup = sections.map((section) => {
          const headerHeight = 54;
          const tableTop = cursorY + headerHeight + 18;
          const rowCount = Math.max(section.rows.length, 1);
          const noteLines = section.note ? wrapSvgLine(section.note, 92) : [];
          const rowHeight = section.index === 3 ? 56 : 52;
          const tableHeight = 52 + (rowCount * rowHeight);
          const noteHeight = noteLines.length ? (noteLines.length * 26) + 24 : 0;
          const cardHeight = headerHeight + 18 + tableHeight + noteHeight + 26;

          const columns = Math.max(section.headers.length, section.rows[0]?.length || 1);
          const maxBoxWidth = section.max ? 152 : 0;
          const tableX = 46 + maxBoxWidth;
          const tableWidth = 988 - maxBoxWidth;
          const cellWidth = tableWidth / Math.max(columns, 1);

          let grid = "";
          if (section.max) {
            grid += `
              <rect x="46" y="${tableTop}" width="${maxBoxWidth}" height="${tableHeight}" rx="16" fill="#0f6fe9" stroke="#f5d829" stroke-width="4"/>
              ${renderSvgMultiline(section.max, 122, tableTop + 82, { fontSize: 30, lineHeight: 34, fill: "#ffe600", fontWeight: 800, anchor: "middle", maxChars: 8 })}
            `;
          }

          grid += `
            <rect x="${tableX}" y="${tableTop}" width="${tableWidth}" height="${tableHeight}" rx="16" fill="#ffffff" stroke="#bfd8ff" stroke-width="2"/>
          `;

          for (let columnIndex = 0; columnIndex < columns; columnIndex += 1) {
            const x = tableX + (columnIndex * cellWidth);
            grid += `<line x1="${x}" y1="${tableTop}" x2="${x}" y2="${tableTop + tableHeight}" stroke="#c8daf7" stroke-width="2"/>`;
          }
          grid += `<line x1="${tableX + tableWidth}" y1="${tableTop}" x2="${tableX + tableWidth}" y2="${tableTop + tableHeight}" stroke="#c8daf7" stroke-width="2"/>`;

          grid += `<rect x="${tableX}" y="${tableTop}" width="${tableWidth}" height="52" fill="#f2f7ff"/>`;
          grid += `<line x1="${tableX}" y1="${tableTop + 52}" x2="${tableX + tableWidth}" y2="${tableTop + 52}" stroke="#c8daf7" stroke-width="2"/>`;

          section.headers.forEach((header, headerIndex) => {
            const textX = tableX + (headerIndex * cellWidth) + (cellWidth / 2);
            grid += renderSvgMultiline(header, textX, tableTop + 33, {
              fontSize: 20,
              lineHeight: 24,
              fill: "#49576f",
              fontWeight: 700,
              anchor: "middle",
              maxChars: 10
            });
          });

          section.rows.forEach((row, rowIndex) => {
            const lineY = tableTop + 52 + (rowIndex * rowHeight);
            grid += `<line x1="${tableX}" y1="${lineY}" x2="${tableX + tableWidth}" y2="${lineY}" stroke="#c8daf7" stroke-width="2"/>`;
            row.forEach((cell, cellIndex) => {
              const cellX = tableX + (cellIndex * cellWidth) + (cellWidth / 2);
              grid += renderSvgMultiline(cell, cellX, lineY + 32, {
                fontSize: 22,
                lineHeight: 26,
                fill: cellIndex === 0 ? "#1f3d63" : "#1671e8",
                fontWeight: cellIndex === 0 ? 700 : 800,
                anchor: "middle",
                maxChars: 10
              });
            });
          });

          if (noteLines.length) {
            grid += renderSvgMultiline(noteLines, 58, tableTop + tableHeight + 28, {
              fontSize: 16,
              lineHeight: 22,
              fill: "#243f61",
              fontWeight: 600,
              maxChars: 92
            });
          }

          const markup = `
            <g>
              <rect x="28" y="${cursorY}" width="1024" height="${cardHeight}" rx="24" fill="rgba(255,255,255,0.92)" stroke="#8ac0ff" stroke-width="2"/>
              <rect x="28" y="${cursorY}" width="1024" height="${headerHeight}" rx="24" fill="#0f75ea"/>
              <text x="540" y="${cursorY + 36}" text-anchor="middle" font-size="32" font-family="Malgun Gothic, Segoe UI, sans-serif" fill="#ffe600" font-weight="800">${escapeSvgText(section.title)}</text>
              <text x="1008" y="${cursorY + 36}" text-anchor="end" font-size="28" font-family="Malgun Gothic, Segoe UI, sans-serif" fill="#ffffff" font-weight="800">${escapeSvgText(section.round)}</text>
              ${grid}
            </g>
          `;
          cursorY += cardHeight + 22;
          return markup;
        }).join("");

        const footerY = cursorY;
        const footerHeight = 116 + (footerLines.length * 28);
        const canvasHeight = footerY + footerHeight + 32;
        const headerProduct = renderSvgMultiline(data.subTitle, 42, 112, {
          fontSize: 22,
          lineHeight: 28,
          fill: "#e9f6ff",
          fontWeight: 700,
          maxChars: 44
        });
        const branchNoteLines = wrapSvgLine(data.branchNote, 10);

        return `
          <svg xmlns="http://www.w3.org/2000/svg" width="1080" height="${canvasHeight}" viewBox="0 0 1080 ${canvasHeight}">
            <defs>
              <linearGradient id="skyBg" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="#0f7ef3"/>
                <stop offset="100%" stop-color="#6bc6ff"/>
              </linearGradient>
            </defs>
            <rect width="1080" height="${canvasHeight}" fill="url(#skyBg)"/>
            <rect x="0" y="0" width="1080" height="154" fill="#0c74eb"/>
            <rect x="820" y="22" width="226" height="110" rx="18" fill="#ffffff" />
            <text x="38" y="66" font-size="38" font-family="Malgun Gothic, Segoe UI, sans-serif" fill="#ffffff" font-weight="800">${escapeSvgText(data.brandName || "삼성생명")}</text>
            <text x="250" y="66" font-size="54" font-family="Malgun Gothic, Segoe UI, sans-serif" fill="#ffe600" font-weight="900">${escapeSvgText(data.mainTitle || "26.6월 프로모션")}</text>
            ${headerProduct}
            ${renderSvgMultiline(data.branchName || "GA코리아", 933, 68, { fontSize: 28, lineHeight: 32, fill: "#14243d", fontWeight: 800, anchor: "middle", maxChars: 10 })}
            ${renderSvgMultiline(branchNoteLines, 933, 102, { fontSize: 24, lineHeight: 28, fill: "#14243d", fontWeight: 800, anchor: "middle", maxChars: 12 })}

            <g>
              <rect x="28" y="154" width="1024" height="44" rx="22" fill="#ffffff" opacity="0.96"/>
              <rect x="42" y="164" width="90" height="26" rx="13" fill="#2fb357"/>
              <text x="87" y="182" text-anchor="middle" font-size="16" font-family="Malgun Gothic, Segoe UI, sans-serif" fill="#ffffff" font-weight="800">${escapeSvgText(data.summaryLabel || "익월")}</text>
              <rect x="44" y="168" width="130" height="88" rx="0" fill="#ffe54f" stroke="#d6b900" stroke-width="3"/>
              <text x="108" y="226" text-anchor="middle" font-size="30" font-family="Malgun Gothic, Segoe UI, sans-serif" fill="#164996" font-weight="900">${escapeSvgText(data.summaryMax || "500%")}</text>
              <text x="540" y="186" text-anchor="middle" font-size="28" font-family="Malgun Gothic, Segoe UI, sans-serif" fill="#ffe600" font-weight="900">${escapeSvgText(data.summaryTitle || "정규 시상")}</text>
              <text x="420" y="242" text-anchor="middle" font-size="60" font-family="Malgun Gothic, Segoe UI, sans-serif" fill="#156fe7" font-weight="900">${escapeSvgText(data.summaryLeft || "300%")}</text>
              <text x="646" y="240" text-anchor="middle" font-size="52" font-family="Malgun Gothic, Segoe UI, sans-serif" fill="#ff3152" font-weight="900">+</text>
              <rect x="676" y="206" width="126" height="28" rx="14" fill="#ef2f3f"/>
              <text x="739" y="225" text-anchor="middle" font-size="14" font-family="Malgun Gothic, Segoe UI, sans-serif" fill="#ffffff" font-weight="800">${escapeSvgText(data.summaryPill || "")}</text>
              <text x="922" y="242" text-anchor="middle" font-size="60" font-family="Malgun Gothic, Segoe UI, sans-serif" fill="#156fe7" font-weight="900">${escapeSvgText(data.summaryRight || "700%")}</text>
            </g>

            ${sectionMarkup}

            <g>
              <rect x="28" y="${footerY}" width="1024" height="${footerHeight}" rx="22" fill="#ffffff" opacity="0.96"/>
              <rect x="48" y="${footerY + 24}" width="130" height="58" rx="16" fill="#246fe4"/>
              <text x="113" y="${footerY + 61}" text-anchor="middle" font-size="26" font-family="Malgun Gothic, Segoe UI, sans-serif" fill="#ffffff" font-weight="800">유의사항</text>
              ${renderSvgMultiline(footerLines.map((line, index) => `${index + 1}. ${line}`), 210, footerY + 58, {
                fontSize: 19,
                lineHeight: 30,
                fill: "#182c47",
                fontWeight: 600,
                maxChars: 78
              })}
            </g>
          </svg>
        `;
      }

      function buildTemplatePreviewUrl(templateData) {
        const svg = buildTemplatePreviewSvg(templateData);
        return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
      }

      function getTemplatePreviewImageSrc(templateData = getActiveTemplateData()) {
        if (!templateData) return "";
        return buildTemplatePreviewUrl(templateData);
      }

      function syncTemplateFrame(frame, templateData) {
        if (!frame || !templateData) return;

        const payload = {
          type: "promo-template-data",
          data: templateData
        };

        const send = () => {
          try {
            if (frame.contentWindow) {
              frame.contentWindow.postMessage(payload, "*");
            }
          } catch (error) {
            console.error("템플릿 데이터 전송 실패", error);
          }
        };

        frame.addEventListener("load", send, { once: true });
        window.setTimeout(send, 120);
      }

      function normalizeCellText(value) {
        return String(value ?? "").replace(/\r/g, " ").replace(/\n/g, " ").trim();
      }

      function compactCellText(value) {
        return normalizeCellText(value).replace(/\s+/g, "");
      }

      function sheetToRows(sheet) {
        if (!sheet || !window.XLSX) return [];
        return window.XLSX.utils.sheet_to_json(sheet, {
          header: 1,
          raw: false,
          defval: ""
        });
      }

      function findColumnIndex(headers, candidates, fallbackIndex = 0) {
        const normalizedHeaders = headers.map(compactCellText);
        for (const candidate of candidates) {
          const target = compactCellText(candidate);
          const index = normalizedHeaders.findIndex((header) => header.includes(target));
          if (index >= 0) return index;
        }
        return fallbackIndex;
      }

      function parseLoginUserWorkbook(fileName, workbook) {
        const firstSheetName = workbook?.SheetNames?.[0];
        if (!firstSheetName) {
          throw new Error("사번 목록 시트를 찾지 못했습니다.");
        }

        const rows = sheetToRows(workbook.Sheets[firstSheetName]).filter((row) => (
          Array.isArray(row) && row.some((cell) => normalizeCellText(cell))
        ));
        if (!rows.length) {
          throw new Error("사번 목록 데이터가 비어 있습니다.");
        }

        const headerRow = rows[0].map(normalizeCellText);
        const hasHeader = headerRow.some((cell) => ["사번", "이름", "성명", "조직", "부서", "소속", "권한", "역할", "구분"].includes(cell));
        const employeeIndex = findColumnIndex(headerRow, ["사번", "임직원번호", "직원번호"], 0);
        const nameIndex = findColumnIndex(headerRow, ["이름", "성명", "담당자명"], 1);
        const roleIndex = findColumnIndex(headerRow, ["권한", "역할", "구분"], 2);
        const orgIndex = findColumnIndex(headerRow, ["조직", "부서", "소속", "본부"], 3);

        const sourceRows = hasHeader ? rows.slice(1) : rows;
        const users = dedupeUsersByEmployeeId(sourceRows.map((row) => {
          const employeeId = normalizeCellText(row[employeeIndex]);
          if (!isFiveDigitNumber(employeeId)) return null;
          const role = normalizeRoleValue(row[roleIndex]);

          return {
            employeeId,
            name: normalizeCellText(row[nameIndex]) || `${role === "hq" ? "본사담당자" : "영업관리자"} ${employeeId}`,
            role,
            org: normalizeCellText(row[orgIndex]) || (role === "hq" ? "본사" : "지점")
          };
        }).filter(Boolean));

        if (!users.length) {
          throw new Error("사번 5자리 데이터를 찾지 못했습니다. 첫 번째 시트에 사번, 이름, 권한, 조직 열을 확인해주세요.");
        }

        return {
          fileName,
          users
        };
      }

      function buildPromotionKey(code, agency) {
        return `${normalizeCellText(code)}||${normalizeCellText(agency)}`;
      }

      function findSheetName(workbook, keyword) {
        if (!workbook) return "";
        const compactKeyword = compactCellText(keyword);
        return workbook.SheetNames.find((name) => compactCellText(name).includes(compactKeyword)) || "";
      }

      function buildTableLookup(rows, dataStartIndex) {
        const lookup = new Map();
        rows.slice(dataStartIndex).forEach((row) => {
          const code = normalizeCellText(row[0]);
          const agency = normalizeCellText(row[1]);
          if (!code || !agency) return;
          lookup.set(buildPromotionKey(code, agency), row);
        });
        return lookup;
      }

      function buildOrgLookup(rows) {
        const lookup = new Map();
        rows.slice(1).forEach((row) => {
          const registrationCode = normalizeCellText(row[7]);
          if (!registrationCode || lookup.has(registrationCode)) return;
          lookup.set(registrationCode, {
            divisionName: normalizeCellText(row[3]).replace(/^GA/, ""),
            branchName: normalizeCellText(row[4]).replace(/^GA/, ""),
            organizationName: normalizeCellText(row[6])
          });
        });
        return lookup;
      }

      function createDefaultUploadMeta() {
        return {
          month: "2026.06",
          targetProducts: "행복종신/플러스원/암치료비플러스/순수3종",
          period: "6/1 ~ 6/28",
          generatedTitle: "26.6월 프로모션"
        };
      }

      function createDefaultUploadBlocks() {
        return [
          "정규시상",
          "기본가동프로모션",
          "5~6월 브릿지",
          "6~7월 브릿지",
          "Gold 시상"
        ];
      }

      function createDefaultNoticeLines() {
        return [
          "세부 지급기준 및 적용조건은 본사 최종 공지 기준으로 운영됩니다.",
          "프로모션별 중복 적용 여부는 항목별 기준을 확인해 주세요.",
          "최종 확정 전 안내장은 변경될 수 있습니다."
        ];
      }

      function toPromotionTitle(monthValue) {
        const normalized = normalizeMonthValue(monthValue);
        const match = normalized.match(/(\d{4})\.(\d{2})/);
        if (!match) return `${normalized} 프로모션`;
        return `${match[1].slice(2)}.${String(Number(match[2]))}월 프로모션`;
      }

      function buildTargetProductsFromRows(rows, indexes = [5, 6]) {
        const products = [];
        rows.forEach((row) => {
          indexes.forEach((index) => {
            const value = normalizeCellText(row[index]);
            if (value && !products.includes(value)) {
              products.push(value);
            }
          });
        });
        return products.slice(0, 5).join("/") || createDefaultUploadMeta().targetProducts;
      }

      function parseNoticeSheetRows(rows) {
        const notices = [];
        rows.forEach((row) => {
          const firstCell = normalizeCellText((row || [])[0] || "");
          const secondCell = normalizeCellText((row || [])[1] || "");
          if (!firstCell && !secondCell) return;

          if (compactCellText(firstCell).startsWith("유의사항")) {
            if (secondCell) notices.push(secondCell);
            return;
          }

          if (secondCell && ["문구", "설명"].includes(firstCell)) return;
          if (firstCell && !secondCell && firstCell.length > 5) {
            notices.push(firstCell);
          }
        });
        return notices.filter(Boolean).slice(0, 3);
      }

      function extractNoticeLines(workbook) {
        const noticeSheetName = findSheetName(workbook, "유의사항입력")
          || findSheetName(workbook, "유의사항")
          || workbook.SheetNames[2]
          || "";
        if (!noticeSheetName) return createDefaultNoticeLines();
        const rows = sheetToRows(workbook.Sheets[noticeSheetName]);
        const notices = parseNoticeSheetRows(rows);
        return notices.length ? notices : createDefaultNoticeLines();
      }

      function parseSimpleMetaAndBlocks(rows) {
        const meta = createDefaultUploadMeta();
        const blocks = [];

        rows.forEach((row) => {
          const key = normalizeCellText((row || [])[0] || "");
          const value = normalizeCellText((row || [])[1] || "");
          if (!key || !value) return;

          if (key === "기준월") meta.month = normalizeMonthValue(value);
          if (key === "대상상품") meta.targetProducts = value;
          if (key === "시상기간") meta.period = value;
          if (compactCellText(key).startsWith("블록")) blocks.push(value);
        });

        meta.generatedTitle = toPromotionTitle(meta.month);
        return {
          meta,
          blocks: blocks.filter(Boolean)
        };
      }

      function normalizeAgencyMatchKey(value) {
        return normalizeCellText(value)
          .replace(/\(주\)|주식회사|㈜/g, "")
          .replace(/\([^)]*\)/g, "")
          .replace(/\s+/g, "")
          .toLowerCase();
      }

      function findAgencySeedInfo(agency) {
        const targetKey = normalizeAgencyMatchKey(agency);
        if (!targetKey) return null;

        const pool = [...state.promotions, ...seedPromotions];
        return pool.find((item) => {
          const itemKey = normalizeAgencyMatchKey(item.agency);
          return itemKey && (itemKey === targetKey || itemKey.includes(targetKey) || targetKey.includes(itemKey));
        }) || null;
      }

      function normalizeOrgMatchKey(value) {
        return normalizeCellText(value)
          .replace(/^ga/i, "")
          .replace(/\s+/g, "")
          .toLowerCase();
      }

      function ensureGaPrefix(value) {
        const text = normalizeCellText(value);
        if (!text) return "";
        return /^ga/i.test(text) ? text : `GA${text}`;
      }

      function findHeaderRowIndex(rows, requiredGroups = []) {
        for (let rowIndex = 0; rowIndex < Math.min(rows.length, 12); rowIndex += 1) {
          const headers = (rows[rowIndex] || []).map(compactCellText);
          const isMatch = requiredGroups.every((candidates) =>
            candidates.some((candidate) => headers.some((header) => header.includes(compactCellText(candidate))))
          );
          if (isMatch) {
            return rowIndex;
          }
        }
        return -1;
      }

      function buildSimpleOrgLookup(workbook) {
        const orgSheetName = findSheetName(workbook, "조직");
        if (!orgSheetName) return new Map();

        const rows = sheetToRows(workbook.Sheets[orgSheetName]);
        const headerIndex = findHeaderRowIndex(rows, [["지점", "지점명", "지사", "지사명"], ["지역단", "지역단명"]]);
        if (headerIndex < 0) return new Map();

        const headers = rows[headerIndex] || [];
        const branchIndex = findColumnIndex(headers, ["지점명", "지점", "지사명", "지사"], -1);
        const regionIndex = findColumnIndex(headers, ["지역단명", "지역단"], -1);
        const lookup = new Map();

        rows.slice(headerIndex + 1).forEach((row) => {
          const branch = normalizeCellText(row[branchIndex]);
          if (!branch) return;
          lookup.set(normalizeOrgMatchKey(branch), {
            branch,
            region: normalizeCellText(row[regionIndex]) || "미지정지역단"
          });
        });

        return lookup;
      }

      function getSimpleWorkbookStatus(row, confirmIndex, pendingIndex) {
        const confirmValue = compactCellText(row[confirmIndex]);
        const pendingValue = compactCellText(row[pendingIndex]);
        const yesSet = new Set(["○", "o", "ok", "y", "yes", "1"]);
        const noSet = new Set(["x", "×", "미확정", "n", "no", "0"]);

        if (yesSet.has(confirmValue)) return "확정";
        if (noSet.has(confirmValue)) return "미확정";
        if (yesSet.has(pendingValue)) return "미확정";

        const hasMetrics = row.some((cell, index) => index > Math.max(confirmIndex, pendingIndex) && normalizeCellText(cell));
        return hasMetrics ? "확정" : "미확정";
      }

      function isSimpleInputWorkbook(workbook) {
        const secondSheetName = workbook?.SheetNames?.[1];
        if (!secondSheetName) return false;
        const rows = sheetToRows(workbook.Sheets[secondSheetName]);
        const keys = rows.slice(0, 12).map((row) => normalizeCellText((row || [])[0] || ""));
        return keys.includes("기준월") && keys.some((key) => compactCellText(key).startsWith("블록"));
      }

      function buildTemplateDataFromSimpleConfig(item, meta, blocks, noticeLines, rows = []) {
        const createInitialFormData = window.PromoTemplateData?.createInitialFormData;
        if (!createInitialFormData) return null;
        const applySheetRowsToData = window.PromoTemplateData?.applySheetRowsToData;

        const data = createInitialFormData();
        data.promoDate = `${meta.month}월`;
        data.brandName = "삼성생명";
        data.mainTitle = meta.generatedTitle || toPromotionTitle(meta.month);
        data.subTitle = `대상상품, ${meta.targetProducts || createDefaultUploadMeta().targetProducts}`;
        data.branchName = item.agency;
        data.branchNote = `(${item.branch || item.region || "미지정"})`;
        data.summaryLabel = "익월";
        data.summaryTitle = `${blocks[0] || "정규 시상"} (${meta.period || "시상기간 확인"})`;
        data.section1Title = blocks[1] || "기본가동프로모션";
        data.section2Title = blocks[2] || "5~6월 브릿지";
        data.section3Title = blocks[3] || "6~7월 브릿지";
        data.section4Title = blocks[4] || "Gold 시상";

        const detailedData = applySheetRowsToData ? applySheetRowsToData(data, rows) : data;
        detailedData.footerBanner = noticeLines.join(" / ");
        return detailedData;
      }

      function buildSimpleWorkbookDataset(workbook, meta, blocks, noticeLines, rows) {
        const dataSheetName = findSheetName(workbook, "데이터");
        if (!dataSheetName) {
          const sampleItem = {
            id: 1,
            code: "SAMPLE",
            agency: "업로드 샘플",
            region: "표준안내장",
            branch: "입력기준",
            rm: "본사담당자",
            product: meta.targetProducts || "프로모션",
            happyType: "",
            month: meta.month,
            status: "확정",
            errorReason: "",
            generated: false,
            updatedAt: getNowStamp(),
            noticeFile: "upload_sample_notice.jpg"
          };

          return {
            promotions: [sampleItem],
            templateForms: {
              1: buildTemplateDataFromSimpleConfig(sampleItem, meta, blocks, noticeLines, rows)
            }
          };
        }

        const dataSheetRows = sheetToRows(workbook.Sheets[dataSheetName]);
        const headerIndex = findHeaderRowIndex(dataSheetRows, [["코드"], ["ga명", "대리점명", "대리점"]]);
        const headerRow = headerIndex >= 0 ? (dataSheetRows[headerIndex] || []) : [];
        const orgLookup = buildSimpleOrgLookup(workbook);
        const confirmIndex = findColumnIndex(headerRow, ["최종확정여부", "확정여부", "확정"], 0);
        const pendingIndex = findColumnIndex(headerRow, ["미확정"], confirmIndex);
        const codeIndex = findColumnIndex(headerRow, ["코드"], Math.max(confirmIndex + 1, 1));
        const agencyIndex = findColumnIndex(headerRow, ["ga명", "대리점명", "대리점"], Math.max(codeIndex + 1, 2));
        const branchIndex = findColumnIndex(headerRow, ["지점명", "지점", "지사명", "지사"], -1);
        const dataRows = dataSheetRows
          .slice(headerIndex >= 0 ? headerIndex + 1 : 7)
          .filter((row) => normalizeCellText((row || [])[codeIndex] || "") || normalizeCellText((row || [])[agencyIndex] || ""));

        const promotions = [];
        const templateForms = {};

        dataRows.forEach((row) => {
          const code = normalizeCellText(row[codeIndex]) || `SIMPLE-${promotions.length + 1}`;
          const agency = ensureGaPrefix(normalizeCellText(row[agencyIndex]));
          if (!agency) return;

          const matched = findAgencySeedInfo(agency);
          const branchCell = branchIndex >= 0 ? normalizeCellText(row[branchIndex]) : "";
          const orgInfo = orgLookup.get(normalizeOrgMatchKey(branchCell));
          const status = getSimpleWorkbookStatus(row, confirmIndex, pendingIndex);
          const itemId = promotions.length + 1;
          const item = {
            id: itemId,
            code,
            agency,
            region: orgInfo?.region || matched?.region || "업로드대상",
            branch: orgInfo?.branch || branchCell || matched?.branch || "전체대리점",
            rm: matched?.rm || "본사담당자",
            product: meta.targetProducts || matched?.product || "프로모션",
            happyType: "",
            month: meta.month,
            status,
            errorReason: status === "미확정" ? "프로모션 수치 데이터 미입력" : "",
            generated: false,
            updatedAt: getNowStamp(),
            noticeFile: `${agency}_안내장.jpg`
          };

          promotions.push(item);

          if (status === "확정") {
            templateForms[itemId] = buildTemplateDataFromSimpleConfig(item, meta, blocks, noticeLines, rows);
          }
        });

        return {
          promotions,
          templateForms
        };
      }

      function parseSimplePromotionWorkbook(fileName, workbook) {
        const secondSheetName = workbook?.SheetNames?.[1];
        if (!secondSheetName) {
          throw new Error("두번째 시트를 찾지 못했습니다.");
        }

        const rows = sheetToRows(workbook.Sheets[secondSheetName]);
        const { meta, blocks } = parseSimpleMetaAndBlocks(rows);
        const noticeLines = extractNoticeLines(workbook);
        const dataset = buildSimpleWorkbookDataset(workbook, meta, blocks, noticeLines, rows);

        return {
          promotions: dataset.promotions,
          templateForms: dataset.templateForms,
          monthValue: meta.month,
          fileName,
          uploadMeta: meta,
          uploadBlocks: blocks.length ? blocks : createDefaultUploadBlocks(),
          uploadNoticeLines: noticeLines,
          uploadMode: "simple"
        };
      }

      function extractUploadMetaFromLegacyWorkbook(workbook, monthValue, mainRows) {
        const meta = createDefaultUploadMeta();
        meta.month = monthValue;
        meta.targetProducts = buildTargetProductsFromRows(mainRows);
        meta.period = `${String(Number(monthValue.split(".")[1] || "6"))}/1 ~ ${String(Number(monthValue.split(".")[1] || "6"))}/28`;
        meta.generatedTitle = toPromotionTitle(monthValue);
        return meta;
      }

      function extractUploadBlocksFromLegacyWorkbook(workbook, mainRows) {
        const blocks = ["정규시상"];
        if (findSheetName(workbook, "기본가동")) blocks.push("기본가동프로모션");
        if (findSheetName(workbook, "5~6월브릿지")) blocks.push("5~6월 브릿지");
        if (findSheetName(workbook, "6~7월브릿지")) blocks.push("6~7월 브릿지");
        const hasGoldLikeData = mainRows.some((row) => normalizeCellText(row[22]) || normalizeCellText(row[23]));
        if (hasGoldLikeData) blocks.push("Gold 시상");
        return blocks;
      }

      function getMonthDisplayFromWorkbook(workbook) {
        const targetSheet = findSheetName(workbook, "6월_지점별 담당 분류_전체") || workbook.SheetNames[0] || "";
        const match = normalizeCellText(targetSheet).match(/(\d{1,2})월/);
        return match ? `2026.${match[1].padStart(2, "0")}` : state.selectedMonth;
      }

      function getHeaderCells(row, startIndex, endIndex, fallback = []) {
        if (!Array.isArray(row)) return fallback;
        const values = row.slice(startIndex, endIndex).map(normalizeCellText).filter(Boolean);
        return values.length ? values : fallback;
      }

      function buildTemplateDataFromRows(item, basicRow, bridge56Row, bridge67Row, headerRows = {}, uploadMeta = createDefaultUploadMeta(), noticeLines = createDefaultNoticeLines()) {
        const createInitialFormData = window.PromoTemplateData?.createInitialFormData;
        if (!createInitialFormData) return null;

        const data = createInitialFormData();
        const monthLabel = uploadMeta.generatedTitle || toPromotionTitle(item.month);
        const amountHeaders = ["5만", "10만", "20만", "30만", "50만", "100만"];
        const basicHeaders = getHeaderCells(headerRows.basic, 6, 12, amountHeaders);
        const bridge56Headers = getHeaderCells(headerRows.bridge56, 3, 9, amountHeaders);
        const bridge67Headers = getHeaderCells(headerRows.bridge67, 3, 9, amountHeaders);

        data.promoDate = item.month.replace(".", ".") + "월";
        data.brandName = "삼성생명";
        data.mainTitle = monthLabel;
        data.subTitle = `대상상품, ${uploadMeta.targetProducts || item.product || "프로모션"}`;
        data.branchName = item.agency;
        data.branchNote = `(${item.branch})`;

        data.summaryLabel = "기준";
        data.summaryMax = normalizeCellText(basicRow[2]);
        data.summaryTitle = normalizeCellText(item.product || item.happyType || "프로모션");
        data.summaryLeft = normalizeCellText(bridge56Row[2]);
        data.summaryPill = uploadMeta.period || item.status;
        data.summaryRight = normalizeCellText(bridge67Row[2]);

        data.section1Title = "기본가동프로모션";
        data.section1Round = "[13회]";
        data.section1Max = normalizeCellText(basicRow[5] || basicRow[2]);
        data.section1Headers = ["실적", ...basicHeaders].join(",");
        data.section1Rows = [
          ["1~13회", ...basicRow.slice(6, 12).map(normalizeCellText)].join("|"),
          ["14~28회", ...basicRow.slice(12, 18).map(normalizeCellText)].join("|")
        ].join("\n");

        data.section2Title = "5~6월 브릿지";
        data.section2Round = "[13회]";
        data.section2Max = normalizeCellText(bridge56Row[2]);
        data.section2Headers = ["실적", ...bridge56Headers].join(",");
        data.section2Rows = [
          ["1~13회", ...bridge56Row.slice(3, 9).map(normalizeCellText)].join("|"),
          ["14~28회", ...bridge56Row.slice(9, 15).map(normalizeCellText)].join("|")
        ].join("\n");
        data.section2Note = noticeLines[0] || "업로드 기준 수치 자동 반영";

        data.section3Title = "6~7월 브릿지";
        data.section3Round = "[13회]";
        data.section3Headers = ["실적", ...bridge67Headers].join(",");
        data.section3Rows = [
          ["1~13회", ...bridge67Row.slice(3, 9).map(normalizeCellText)].join("|"),
          ["14~28회", ...bridge67Row.slice(9, 15).map(normalizeCellText)].join("|")
        ].join("\n");

        data.section4Title = "Gold 시상";
        data.footerBanner = noticeLines.join(" / ") || `${item.rm} · ${item.product}`;
        return data;
      }

      function parsePromotionWorkbook(fileName, workbook) {
        if (isSimpleInputWorkbook(workbook)) {
          return parseSimplePromotionWorkbook(fileName, workbook);
        }

        const mainSheetName = findSheetName(workbook, "6월_지점별 담당 분류_전체");
        const basicSheetName = findSheetName(workbook, "기본가동");
        const bridge56SheetName = findSheetName(workbook, "5~6월브릿지");
        const bridge67SheetName = findSheetName(workbook, "6~7월브릿지");
        const orgSheetName = findSheetName(workbook, "조직");

        if (!mainSheetName || !basicSheetName || !bridge56SheetName || !bridge67SheetName || !orgSheetName) {
          throw new Error("필수 시트를 찾지 못했습니다. 6월_지점별 담당 분류_전체, 기본가동, 5~6월브릿지, 6~7월브릿지, 조직 시트를 확인해주세요.");
        }

        const monthValue = getMonthDisplayFromWorkbook(workbook);
        const mainRows = sheetToRows(workbook.Sheets[mainSheetName]);
        const basicRows = sheetToRows(workbook.Sheets[basicSheetName]);
        const bridge56Rows = sheetToRows(workbook.Sheets[bridge56SheetName]);
        const bridge67Rows = sheetToRows(workbook.Sheets[bridge67SheetName]);
        const orgRows = sheetToRows(workbook.Sheets[orgSheetName]);
        const headerRows = {
          basic: basicRows[4] || [],
          bridge56: bridge56Rows[4] || [],
          bridge67: bridge67Rows[4] || []
        };

        const basicLookup = buildTableLookup(basicRows, 6);
        const bridge56Lookup = buildTableLookup(bridge56Rows, 6);
        const bridge67Lookup = buildTableLookup(bridge67Rows, 6);
        const orgLookup = buildOrgLookup(orgRows);
        const uploadMeta = extractUploadMetaFromLegacyWorkbook(workbook, monthValue, mainRows);
        const uploadBlocks = extractUploadBlocksFromLegacyWorkbook(workbook, mainRows);
        const uploadNoticeLines = extractNoticeLines(workbook);

        const promotions = [];
        const templateForms = {};
        const dataRows = mainRows.slice(7).filter((row) => normalizeCellText(row[2]) || normalizeCellText(row[4]));

        dataRows.forEach((row, index) => {
          const code = normalizeCellText(row[2]);
          const agency = normalizeCellText(row[4]);
          if (!code || !agency) return;

          const key = buildPromotionKey(code, agency);
          const orgInfo = orgLookup.get(code);
          const basicRow = basicLookup.get(key);
          const bridge56Row = bridge56Lookup.get(key);
          const bridge67Row = bridge67Lookup.get(key);
          const finalConfirm = normalizeCellText(row[7]);
          const fallbackBranch = normalizeCellText(row[24]);
          const region = orgInfo?.divisionName || fallbackBranch || "미지정";
          const branch = orgInfo?.branchName || fallbackBranch || "미지정";

          let status = "확정";
          let errorReason = "";
          let templateData = null;

          if (!branch || branch === "미지정") {
            status = "오류";
            errorReason = "조직 매핑 없음";
          } else if (!basicRow || !bridge56Row || !bridge67Row) {
            status = "미확정";
          } else if (finalConfirm !== "○") {
            status = "미확정";
          } else {
            try {
              templateData = buildTemplateDataFromRows({
                agency,
                region,
                branch,
                product: normalizeCellText(row[5]) || "프로모션",
                happyType: normalizeCellText(row[6]),
                rm: normalizeCellText(row[25]) || "미배정",
                month: monthValue,
                status
              }, basicRow, bridge56Row, bridge67Row, headerRows, uploadMeta, uploadNoticeLines);
            } catch (error) {
              console.error("안내장 데이터 변환 실패", { agency, code, error });
              status = "오류";
              errorReason = "안내장 데이터 변환 실패";
            }
          }

          const itemId = index + 1;
          promotions.push({
            id: itemId,
            code,
            agency,
            region,
            branch,
            rm: normalizeCellText(row[25]) || "미배정",
            product: normalizeCellText(row[5]) || "프로모션",
            happyType: normalizeCellText(row[6]),
            month: monthValue,
            status,
            errorReason,
            generated: false,
            updatedAt: getNowStamp(),
            noticeFile: `${agency}_안내장.png`
          });

          if (templateData) {
            templateForms[itemId] = templateData;
          }
        });

        return {
          promotions,
          templateForms,
          monthValue,
          fileName,
          uploadMeta,
          uploadBlocks,
          uploadNoticeLines,
          uploadMode: "legacy"
        };
      }

        return `

      function buildUserFromEmployeeId(employeeId) {
        return getAllLoginUsers().find((user) => user.employeeId === employeeId) || null;
      }

      function isFiveDigitNumber(value) {
        return /^\d{5}$/.test(value);
      }

      function isBranchMatch(item, org) {
        return [item.branch, item.region, item.agency, item.rm]
          .filter(Boolean)
          .some((value) => String(value).includes(org));
      }

      function getUserScopedPromotions() {
        if (!state.currentUser) return [];
        if (state.currentUser.role === "hq" || state.showAllAgencies) {
          return state.promotions;
        }

        const scoped = state.promotions.filter((item) => isBranchMatch(item, state.currentUser.org));
        return scoped.length ? scoped : state.promotions;
      }

      function getMonthScopedPromotions() {
        return getUserScopedPromotions().filter((item) => item.month === state.selectedMonth);
      }

      function getRegionOptions(data) {
        return [...new Set(data.map((item) => item.region).filter(Boolean))].sort((a, b) => a.localeCompare(b, "ko"));
      }

      function getBranchOptions(data) {
        return [...new Set(data.map((item) => item.branch).filter(Boolean))].sort((a, b) => a.localeCompare(b, "ko"));
      }

      function getStatusSortValue(status) {
        if (status === "확정") return 3;
        if (status === "미확정") return 2;
        return 1;
      }

      function sortPromotions(data) {
        const sorted = [...data];
        const direction = state.sortDirection === "desc" ? -1 : 1;

        sorted.sort((a, b) => {
          let compare = 0;

          if (state.sortField === "region") {
            compare = a.region.localeCompare(b.region, "ko");
          } else if (state.sortField === "branch") {
            compare = a.branch.localeCompare(b.branch, "ko");
          } else if (state.sortField === "agency") {
            compare = a.agency.localeCompare(b.agency, "ko");
          } else if (state.sortField === "status") {
            compare = getStatusSortValue(a.status) - getStatusSortValue(b.status);
          } else if (state.sortField === "updatedAt") {
            compare = a.updatedAt.localeCompare(b.updatedAt);
          }

          if (compare === 0) {
            compare = a.agency.localeCompare(b.agency, "ko");
          }

          return compare * direction;
        });

        return sorted;
      }

      function applyFilters(data) {
        let filtered = [...data];

        if (state.regionFilter !== "all") {
          filtered = filtered.filter((item) => item.region === state.regionFilter);
        }

        if (state.branchFilter !== "all") {
          filtered = filtered.filter((item) => item.branch === state.branchFilter);
        }

        if (state.statusFilter !== "all") {
          filtered = filtered.filter((item) => item.status === state.statusFilter);
        }

        if (state.agencyQuery) {
          const keyword = state.agencyQuery.toLowerCase();
          filtered = filtered.filter((item) => item.agency.toLowerCase().includes(keyword));
        }

        return filtered;
      }

      function escapeSvgText(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function buildNoticeHref(item, format) {
        const title = `${item.agency} ${item.product} 안내장`;
        if (format === "image") {
          const safeTitle = escapeSvgText(title);
          const safeAgency = escapeSvgText(item.agency);
          const safeRegion = escapeSvgText(item.region);
          const safeBranch = escapeSvgText(item.branch);
          const safeProduct = escapeSvgText(item.product);
          const safeMonth = escapeSvgText(item.month);
          const safeStatus = escapeSvgText(item.status);
          const safeRm = escapeSvgText(item.rm);
          const svg = `
            <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600">
              <rect width="100%" height="100%" fill="#eef3fb"/>
              <rect x="18" y="18" width="1164" height="1564" rx="30" fill="#ffffff"/>
              <rect x="18" y="18" width="1164" height="120" rx="30" fill="#0e49b5"/>
              <rect x="834" y="32" width="330" height="92" rx="20" fill="#ffffff"/>
              <text x="58" y="92" font-size="52" font-family="Malgun Gothic, Segoe UI, sans-serif" fill="#ffffff" font-weight="700">삼성생명 ${safeMonth} 프로모션</text>
              <text x="999" y="90" text-anchor="middle" font-size="34" font-family="Malgun Gothic, Segoe UI, sans-serif" fill="#13233f" font-weight="700">${safeAgency}</text>

              <rect x="30" y="154" width="1140" height="58" rx="18" fill="#111111"/>
              <text x="600" y="194" text-anchor="middle" font-size="34" font-family="Malgun Gothic, Segoe UI, sans-serif" fill="#ffe600" font-weight="700">${safeProduct} 프로모션 표준 안내장</text>

      async function downloadNoticeAsJpg(item) {
        const templateData = state.templateForms[item.id];
        if (!templateData) {
          throw new Error("표준안내장 데이터가 없어 다운로드할 수 없습니다.");
        }
        const storageKey = `promo-template-download-${item.id}-${Date.now()}`;
        window.localStorage.setItem(storageKey, JSON.stringify(templateData));

        const downloadUrl = `./template-package/promo-template.html?preview=1&autodownload=1&storageKey=${encodeURIComponent(storageKey)}&fileName=${encodeURIComponent(`${item.agency}_안내장.jpg`)}`;
        const openedWindow = window.open(downloadUrl, "_blank");
        if (!openedWindow) {
          throw new Error("브라우저가 다운로드 창 열기를 차단했습니다.");
        }
      }

      async function handleDownloadClick(button) {
        const isEnabled = button.dataset.downloadEnabled === "true";
        const status = button.dataset.downloadStatus || "";
        const targetId = Number(button.dataset.downloadId);

        if (!isEnabled) {
          if (status === "미확정") {
            window.alert("미확정 건은 다운로드할 수 없습니다.");
          } else if (status === "오류") {
            window.alert("오류 건은 다운로드할 수 없습니다. 오류 사유를 먼저 확인해주세요.");
          } else {
            window.alert("표준안내장 생성과 전체 승인 후 다운로드할 수 있습니다.");
          }
          return false;
        }

        const item = state.promotions.find((promotion) => promotion.id === targetId);
        if (!item) {
          window.alert("다운로드 대상을 찾지 못했습니다.");
          return false;
        }

        try {
          await downloadNoticeAsJpg(item);
        } catch (error) {
          console.error(error);
          window.alert(`다운로드에 실패했습니다.\n${error.message}`);
        }

        return false;
      }

      window.handleDownloadClick = handleDownloadClick;

      function buildNoticeHref(item, format) {
        if (format !== "image") return "";

      function loadImageFromUrl(url) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error("안내장 이미지를 불러오지 못했습니다."));
          image.src = url;
        });
      }

      async function downloadNoticeAsJpg(item) {
        const previewUrl = buildNoticeHref(item, "image");
        if (!previewUrl) {
          throw new Error("표준안내장 데이터가 없어 다운로드할 수 없습니다.");
        }

        const image = await loadImageFromUrl(previewUrl);
        const canvas = document.createElement("canvas");
        canvas.width = image.naturalWidth || 1080;
        canvas.height = image.naturalHeight || 1600;
        const context = canvas.getContext("2d");
        context.fillStyle = "#ffffff";
        context.fillRect(0, 0, canvas.width, canvas.height);
        context.drawImage(image, 0, 0, canvas.width, canvas.height);

        const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/jpeg", 0.96));
        if (!blob) {
          throw new Error("JPEG 파일 생성에 실패했습니다.");
        }

        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `${item.agency}_안내장.jpg`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        window.setTimeout(() => URL.revokeObjectURL(url), 1000);
      }
