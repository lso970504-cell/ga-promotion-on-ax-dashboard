<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GA 프로모션 ON AX 대시보드</title>
    <style>
      :root {
        --brand-950: #0a2a66;
        --brand-900: #10387e;
        --brand-700: #1a57b8;
        --brand-500: #4d8dff;
        --ink-900: #13233f;
        --ink-700: #41506c;
        --ink-500: #697997;
        --line: #d8e1f0;
        --surface: #f3f7fd;
        --card: #ffffff;
        --success: #18a957;
        --warning: #f1b80b;
        --danger: #da3848;
        --shadow: 0 18px 42px rgba(14, 34, 73, 0.12);
        --radius-xl: 28px;
        --radius-lg: 20px;
        --radius-md: 14px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Malgun Gothic", sans-serif;
        color: var(--ink-900);
        background:
          radial-gradient(circle at top right, rgba(77, 141, 255, 0.24), transparent 20rem),
          linear-gradient(180deg, #eef4ff 0%, var(--surface) 100%);
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app-shell {
        min-height: 100vh;
      }

      .screen {
        min-height: 100vh;
      }

      .login-screen {
        display: grid;
        place-items: center;
        padding: 36px 28px;
      }

      .login-layout {
        width: min(1100px, 100%);
        display: grid;
        grid-template-columns: minmax(0, 1.05fr) minmax(360px, 0.82fr);
        gap: 28px;
      }

      .hero-panel,
      .login-card,
      .dashboard-card,
      .panel {
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.75);
        box-shadow: var(--shadow);
      }

      .hero-panel {
        position: relative;
        overflow: hidden;
        border-radius: 36px;
        padding: 54px 48px;
        background:
          radial-gradient(circle at 18% 22%, rgba(255, 255, 255, 0.18), transparent 22rem),
          linear-gradient(145deg, rgba(8, 38, 95, 0.98), rgba(20, 94, 178, 0.92));
        color: #fff;
      }

      .hero-panel::before,
      .hero-panel::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
      }

      .hero-panel::before {
        width: 260px;
        height: 260px;
        top: -72px;
        right: -72px;
      }

      .hero-panel::after {
        width: 180px;
        height: 180px;
        bottom: -56px;
        left: -56px;
      }

      .brand-badge {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      .brand-badge::before {
        content: "";
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: #fff;
        box-shadow: 18px 0 0 rgba(255, 255, 255, 0.5);
      }

      .hero-title {
        position: relative;
        margin: 28px 0 18px;
        font-size: clamp(38px, 5vw, 58px);
        line-height: 1.04;
        letter-spacing: -0.03em;
      }

      .hero-copy {
        position: relative;
        margin: 0;
        max-width: 520px;
        color: rgba(255, 255, 255, 0.82);
        font-size: 18px;
        line-height: 1.75;
      }

      .hero-note-list {
        position: relative;
        display: grid;
        gap: 12px;
        margin-top: 34px;
        max-width: 470px;
      }

      .hero-note-item {
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 56px;
        padding: 14px 18px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(10px);
        color: rgba(255, 255, 255, 0.9);
        font-size: 15px;
        line-height: 1.55;
      }

      .hero-note-item::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #ffffff;
        box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.18);
        flex: 0 0 auto;
      }

      .login-card {
        position: relative;
        border-radius: 36px;
        padding: 38px 34px 34px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.99), rgba(245, 249, 255, 0.98));
      }

      .login-card::before {
        content: "";
        position: absolute;
        inset: 0 auto auto 0;
        width: 100%;
        height: 6px;
        border-radius: 36px 36px 0 0;
        background: linear-gradient(90deg, var(--brand-900), #3e8dff);
      }

      .card-label {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 999px;
        background: #eef4ff;
        color: var(--brand-900);
        font-size: 12px;
        font-weight: 700;
      }

      .login-card h2 {
        margin: 16px 0 8px;
        font-size: 34px;
        letter-spacing: -0.02em;
      }

      .login-card p {
        margin: 0 0 20px;
        color: var(--ink-700);
        line-height: 1.6;
      }

      .login-intro {
        font-size: 15px;
      }

      .field-group {
        display: grid;
        gap: 8px;
        margin-top: 18px;
      }

      .field-group label {
        font-size: 14px;
        font-weight: 700;
      }

      .field {
        width: 100%;
        height: 58px;
        padding: 0 18px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: #fcfdff;
        color: var(--ink-900);
      }

      .field:focus {
        outline: 2px solid rgba(77, 141, 255, 0.28);
        border-color: var(--brand-500);
      }

      .button-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 24px;
      }

      .primary-button,
      .secondary-button,
      .ghost-button,
      .status-button {
        border: 0;
        cursor: pointer;
        transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      }

      .primary-button:hover,
      .secondary-button:hover,
      .ghost-button:hover,
      .status-button:hover {
        transform: translateY(-1px);
      }

      .primary-button {
        min-width: 150px;
        height: 52px;
        padding: 0 18px;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--brand-900), var(--brand-700));
        color: #fff;
        box-shadow: 0 12px 24px rgba(18, 70, 150, 0.22);
      }

      .secondary-button,
      .ghost-button {
        min-width: 150px;
        height: 52px;
        padding: 0 18px;
        border-radius: 14px;
        background: #eff4fb;
        color: var(--brand-900);
      }

      .helper-box {
        margin-top: 24px;
        padding: 20px;
        border-radius: 20px;
        background: linear-gradient(180deg, #f7faff, #eef4fd);
        border: 1px solid #e1eaf7;
      }

      .helper-box h3 {
        margin: 0 0 12px;
        font-size: 14px;
      }

      .helper-box p {
        margin: 6px 0;
        font-size: 14px;
      }

      .login-subcopy {
        display: block;
        margin-top: 8px;
        color: var(--ink-500);
        font-size: 13px;
      }

      .error-text {
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(218, 56, 72, 0.1);
        color: #ba2332;
        font-size: 14px;
      }

      .dashboard-screen {
        padding: 24px;
      }

      .dashboard-shell {
        width: min(1400px, 100%);
        margin: 0 auto;
        display: grid;
        gap: 20px;
      }

      .dashboard-card,
      .panel {
        border-radius: var(--radius-xl);
      }

      .dashboard-card {
        padding: 30px 32px;
      }

      .dashboard-header {
        display: grid;
        gap: 22px;
        background:
          linear-gradient(135deg, rgba(10, 42, 102, 0.98), rgba(18, 89, 177, 0.92)),
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0));
        color: #fff;
      }

      .header-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
      }

      .header-titleblock {
        max-width: 860px;
      }

      .dashboard-header h1 {
        margin: 10px 0 0;
        font-size: clamp(36px, 4.6vw, 52px);
        line-height: 1.04;
        white-space: nowrap;
        letter-spacing: -0.03em;
      }

      .header-subtitles {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 16px;
      }

      .header-subtitle {
        display: inline-flex;
        align-items: center;
        min-height: 40px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        font-size: 14px;
        font-weight: 700;
      }

      .header-copy {
        margin: 12px 0 0;
        max-width: 740px;
        color: rgba(255, 255, 255, 0.82);
        line-height: 1.6;
      }

      .header-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .month-tabs {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .month-tab {
        min-width: 92px;
        height: 42px;
        padding: 0 14px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.84);
        cursor: pointer;
        transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease;
      }

      .month-tab:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.14);
      }

      .month-tab.active {
        background: #fff;
        color: var(--brand-900);
        font-weight: 700;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      .summary-card {
        padding: 22px 20px;
        border-radius: 22px;
        background: linear-gradient(180deg, #ffffff, #f8fbff);
        border: 1px solid #e4ebf6;
      }

      .summary-card span {
        display: block;
        font-size: 13px;
        color: var(--ink-500);
      }

      .summary-card strong {
        display: block;
        margin-top: 8px;
        font-size: 30px;
        color: var(--brand-950);
      }

      .content-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.65fr) minmax(320px, 0.95fr);
        gap: 20px;
      }

      .stack-section {
        display: grid;
        gap: 20px;
      }

      .dashboard-board {
        display: grid;
        grid-template-columns: 1.15fr 0.95fr;
        gap: 20px;
      }

      .board-card {
        padding: 24px;
        border-radius: 24px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(244, 248, 255, 0.98));
        border: 1px solid #e4ebf6;
      }

      .board-card h2,
      .board-card h3 {
        margin: 0;
      }

      .board-card p {
        margin: 10px 0 0;
        color: var(--ink-700);
        line-height: 1.6;
      }

      .board-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }

      .board-stat {
        padding: 18px;
        border-radius: 20px;
        background: #fff;
        border: 1px solid #e7edf8;
      }

      .board-stat span {
        display: block;
        font-size: 12px;
        color: var(--ink-500);
      }

      .board-stat strong {
        display: block;
        margin-top: 8px;
        font-size: 26px;
        color: var(--brand-950);
      }

      .board-stat em {
        display: block;
        margin-top: 6px;
        font-style: normal;
        color: var(--ink-700);
        font-size: 13px;
      }

      .timeline-list {
        display: grid;
        gap: 12px;
        margin-top: 18px;
        max-height: 338px;
        overflow-y: auto;
        padding-right: 6px;
      }

      .timeline-item {
        display: grid;
        grid-template-columns: 92px 1fr;
        gap: 14px;
        align-items: start;
        padding: 14px 16px;
        border-radius: 18px;
        background: #fff;
        border: 1px solid #e7edf8;
      }

      .timeline-time {
        color: var(--brand-900);
        font-size: 12px;
        font-weight: 700;
      }

      .timeline-body strong {
        display: block;
        font-size: 14px;
      }

      .timeline-body span {
        display: block;
        margin-top: 4px;
        color: var(--ink-500);
        font-size: 12px;
      }

      .panel {
        padding: 24px;
      }

      .panel-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 18px;
      }

      .panel-head h2 {
        margin: 0;
        font-size: 22px;
      }

      .panel-head p {
        margin: 8px 0 0;
        color: var(--ink-700);
        line-height: 1.6;
      }

      .filter-stack {
        display: grid;
        gap: 12px;
        margin-bottom: 18px;
      }

      .search-filter-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1.15fr) 110px;
        gap: 12px;
        align-items: end;
      }

      .search-filter-grid.secondary {
        grid-template-columns: minmax(0, 1fr) 220px;
        justify-content: start;
      }

      .search-filter-field {
        display: grid;
        gap: 8px;
      }

      .search-filter-field label {
        color: var(--ink-700);
        font-size: 14px;
        font-weight: 700;
      }

      .search-filter-control {
        width: 100%;
        height: 56px;
        padding: 0 18px;
        border: 1px solid #dbe5f3;
        border-radius: 18px;
        background: #fff;
        color: var(--brand-950);
        font-size: 15px;
        font-weight: 700;
      }

      .search-filter-button {
        width: 100%;
        height: 56px;
        border: 0;
        border-radius: 18px;
        background: #243f81;
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
      }

      .search-filter-toggle {
        width: 100%;
        height: 56px;
        border: 1px solid #dbe5f3;
        border-radius: 18px;
        background: #fff;
        color: var(--brand-900);
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }

      .table-wrap {
        overflow-x: auto;
        border: 1px solid #e4ebf6;
        border-radius: 18px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 920px;
        background: #fff;
      }

      thead {
        background: #f7faff;
      }

      th,
      td {
        padding: 16px 14px;
        border-bottom: 1px solid #edf2fa;
        text-align: left;
        font-size: 14px;
        vertical-align: middle;
      }

      th {
        color: var(--ink-700);
        font-weight: 700;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      .agency-cell strong,
      .file-list strong {
        display: block;
      }

      .agency-cell span,
      .file-list span,
      .mini-note {
        display: block;
        margin-top: 4px;
        font-size: 12px;
        color: var(--ink-500);
      }

      .traffic {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        border-radius: 999px;
        font-weight: 700;
        font-size: 13px;
      }

      .traffic::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 999px;
      }

      .traffic.confirmed {
        background: rgba(24, 169, 87, 0.1);
        color: #127841;
      }

      .traffic.confirmed::before {
        background: var(--success);
        box-shadow: 0 0 0 5px rgba(24, 169, 87, 0.14);
      }

      .traffic.pending {
        background: rgba(241, 184, 11, 0.14);
        color: #8b6905;
      }

      .traffic.pending::before {
        background: var(--warning);
        box-shadow: 0 0 0 5px rgba(241, 184, 11, 0.14);
      }

      .traffic.error,
      .traffic.rejected {
        background: rgba(218, 56, 72, 0.12);
        color: #a61f2d;
      }

      .traffic.error::before,
      .traffic.rejected::before {
        background: var(--danger);
        box-shadow: 0 0 0 5px rgba(218, 56, 72, 0.14);
      }

      .status-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .status-button {
        height: 34px;
        padding: 0 12px;
        border-radius: 10px;
        background: #eff4fb;
        color: var(--brand-950);
      }

      .download-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 132px;
        padding: 9px 12px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 700;
        background: #edf3fc;
        color: var(--ink-700);
      }

      .download-chip.active {
        background: rgba(16, 56, 126, 0.12);
        color: var(--brand-950);
      }

      .notice-links {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .notice-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 72px;
        height: 34px;
        padding: 0 12px;
        border: 1px solid #d7e2f4;
        border-radius: 999px;
        background: #f8fbff;
        color: var(--brand-900);
        font-size: 12px;
        font-weight: 700;
        text-decoration: none;
      }

      .side-stack {
        display: grid;
        gap: 20px;
      }

      .role-card {
        padding: 20px;
        border-radius: 22px;
        background: linear-gradient(180deg, #f9fbff, #f2f7ff);
        border: 1px solid #dfebfb;
      }

      .role-card h3,
      .file-panel h3 {
        margin: 0;
        font-size: 18px;
      }

      .role-card p,
      .file-panel p {
        margin: 10px 0 0;
        color: var(--ink-700);
        line-height: 1.6;
      }

      .bullet-list {
        display: grid;
        gap: 10px;
        margin-top: 18px;
      }

      .bullet-item {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        color: var(--ink-700);
        font-size: 14px;
        line-height: 1.55;
      }

      .bullet-item::before {
        content: "";
        width: 8px;
        height: 8px;
        margin-top: 7px;
        border-radius: 999px;
        background: var(--brand-500);
        flex: 0 0 auto;
      }

      .file-panel {
        padding: 22px;
        border-radius: 22px;
        background: #fff;
        border: 1px solid #e4ebf6;
      }

      .button-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
      }

      .resource-room {
        padding: 8px 0 4px;
      }

      .resource-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .resource-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 20px 22px;
        border-radius: 22px;
        background: #fff;
        border: 1px solid #e3e9f3;
        box-shadow: 0 10px 26px rgba(14, 34, 73, 0.04);
      }

      .resource-card strong {
        display: block;
        font-size: 16px;
        color: var(--brand-950);
      }

      .resource-card span {
        display: block;
        margin-top: 6px;
        color: var(--ink-500);
        font-size: 13px;
      }

      .resource-button {
        min-width: 100px;
        height: 44px;
        padding: 0 18px;
        border: 1px solid #d5dff1;
        border-radius: 999px;
        background: #fff;
        color: var(--brand-900);
        font-weight: 700;
        text-decoration: none;
      }

      .file-box {
        margin-top: 18px;
        padding: 16px;
        border-radius: 16px;
        background: #f6f9ff;
        border: 1px dashed #c9d8f1;
      }

      .file-list {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }

      .file-item {
        padding: 14px 16px;
        border-radius: 16px;
        background: #f9fbff;
        border: 1px solid #e7edf8;
      }

      .meta-bar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 18px;
      }

      .meta-box {
        padding: 12px 14px;
        border-radius: 14px;
        background: #f5f8fe;
        color: var(--ink-700);
        font-size: 13px;
      }

      .user-strip {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 20px;
        border-radius: 20px;
        background: #f8fbff;
        border: 1px solid #e2eaf7;
      }

      .user-strip strong {
        display: block;
        font-size: 17px;
      }

      .user-strip span {
        display: block;
        margin-top: 4px;
        color: var(--ink-500);
        font-size: 13px;
      }

      .top-meta-strip {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 16px;
        border-radius: 18px;
        background: #f8fbff;
        border: 1px solid #e0e8f6;
      }

      .top-meta-strip span {
        color: var(--ink-500);
        font-size: 13px;
        font-weight: 700;
      }

      .top-meta-strip strong {
        color: var(--brand-950);
        font-size: 14px;
      }

      .empty-box {
        padding: 24px;
        border-radius: 18px;
        background: #f7faff;
        color: var(--ink-700);
        text-align: center;

      function statusFromKey(statusKey) {
        if (statusKey === "confirmed") return "확정";
        if (statusKey === "error" || statusKey === "rejected") return "오류";
        return "미확정";
      }

      function normalizeMonthValue(value) {
        if (!value) return "2026.06";
        const text = String(value);
        const match = text.match(/(20\d{2})\D?(\d{1,2})/);
        if (!match) return "2026.06";
        return `${match[1]}.${match[2].padStart(2, "0")}`;
      }

      function normalizePromotion(item, index) {
        const id = item.id ?? index + 1;
        const month = normalizeMonthValue(item.month || item.updatedAt);
        const status = item.status || statusFromKey(item.statusKey);

        return {
          ...item,
          id,
          agency: item.agency || `대리점 ${id}`,
          region: item.region || item.branch || "미지정",
          branch: item.branch || item.region || "미지정",
          rm: item.rm || "미배정",
          product: item.product || item.happyType || "프로모션",
          month,
          status,
          errorReason: item.errorReason || (status === "오류" ? "오류 사유 확인 필요" : ""),
          generated: Boolean(item.generated),
          noticeFile: item.noticeFile || `promo_${id}.png`,
          updatedAt: item.updatedAt || `${month.replace(".", "-")}-01 09:00`
        };
      }

      function getInitialPromotions() {
        if (Array.isArray(window.PROMO_SOURCE_DATA) && window.PROMO_SOURCE_DATA.length) {
          return window.PROMO_SOURCE_DATA.map((item, index) => normalizePromotion(item, index));
        }
        return seedPromotions.map((item, index) => normalizePromotion(item, index));
      }

      const state = {
        currentUser: null,
        showAllAgencies: false,
        statusFilter: "all",
        regionFilter: "all",
        branchFilter: "all",
        agencyKeyword: "",
        agencyQuery: "",
        promotions: getInitialPromotions(),
        selectedMonth: "2026.06",
        period: "직전 6개월",
        excelUpdatedAt: "2026-06-16 09:20",
        generatedAt: "",
        approvedAt: "",
        selectedUploadFileName: "6월 프로모션 총괄판(260529)_공지4.xlsx",
        templateForms: {},
        adminPanelOpen: false,
        previewItemId: null,
        showTemplatePreview: false
      };

      function getStatusClass(status) {
        if (status === "확정") return "confirmed";
        if (status === "오류") return "error";
        return "pending";
      }

      function getSummary(data) {
        return {
          total: data.length,
          confirmed: data.filter((item) => item.status === "확정").length,
          pending: data.filter((item) => item.status === "미확정").length,
          error: data.filter((item) => item.status === "오류").length,
          updatedToday: data.filter((item) => item.updatedAt.startsWith("2026-06-16")).length
        };
      }

      function getNowStamp() {
        const now = new Date();
        const pad = (value) => String(value).padStart(2, "0");
        return `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
      }

      function canGenerateItem(item) {
        return item.status === "확정" && Boolean(state.templateForms[item.id]);
      }

      function isDownloadEnabled(item) {
        return item.status === "확정" && item.generated && Boolean(state.approvedAt);
      }

      function getGeneratedPreviewItems(data) {
        return data.filter((item) => item.generated);
      }

      function getPreviewItem() {
        return state.promotions.find((item) => item.id === state.previewItemId) || null;
      }

      function getPreviewTemplateData() {
        if (!state.previewItemId) return null;
        return state.templateForms[state.previewItemId] || null;
      }

      function getActiveTemplateData() {
        const previewData = getPreviewTemplateData();
        if (previewData) return previewData;

        const firstTemplateItem = state.promotions.find((item) => state.templateForms[item.id]);
        return firstTemplateItem ? state.templateForms[firstTemplateItem.id] : null;
      }

      function syncTemplateFrame(frame, templateData) {
        if (!frame || !templateData) return;

        const payload = {
          type: "promo-template-data",
          data: templateData
        };

        const send = () => {
          try {
            if (frame.contentWindow) {
              frame.contentWindow.postMessage(payload, "*");
            }
          } catch (error) {
            console.error("템플릿 데이터 전송 실패", error);
          }
        };

        frame.addEventListener("load", send, { once: true });
        window.setTimeout(send, 120);
      }

      function normalizeCellText(value) {
        return String(value ?? "").replace(/\r/g, " ").replace(/\n/g, " ").trim();
      }

      function compactCellText(value) {
        return normalizeCellText(value).replace(/\s+/g, "");
      }

      function sheetToRows(sheet) {
        if (!sheet || !window.XLSX) return [];
        return window.XLSX.utils.sheet_to_json(sheet, {
          header: 1,
          raw: false,
          defval: ""
        });
      }

      function buildPromotionKey(code, agency) {
        return `${normalizeCellText(code)}||${normalizeCellText(agency)}`;
      }

      function findSheetName(workbook, keyword) {
        if (!workbook) return "";
        const compactKeyword = compactCellText(keyword);
        return workbook.SheetNames.find((name) => compactCellText(name).includes(compactKeyword)) || "";
      }

      function buildTableLookup(rows, dataStartIndex) {
        const lookup = new Map();
        rows.slice(dataStartIndex).forEach((row) => {
          const code = normalizeCellText(row[0]);
          const agency = normalizeCellText(row[1]);
          if (!code || !agency) return;
          lookup.set(buildPromotionKey(code, agency), row);
        });
        return lookup;
      }

      function buildOrgLookup(rows) {
        const lookup = new Map();
        rows.slice(1).forEach((row) => {
          const registrationCode = normalizeCellText(row[7]);
          if (!registrationCode || lookup.has(registrationCode)) return;
          lookup.set(registrationCode, {
            divisionName: normalizeCellText(row[3]).replace(/^GA/, ""),
            branchName: normalizeCellText(row[4]).replace(/^GA/, ""),
            organizationName: normalizeCellText(row[6])
          });
        });
        return lookup;
      }

      function getMonthDisplayFromWorkbook(workbook) {
        const targetSheet = findSheetName(workbook, "6월_지점별 담당 분류_전체") || workbook.SheetNames[0] || "";
        const match = normalizeCellText(targetSheet).match(/(\d{1,2})월/);
        return match ? `2026.${match[1].padStart(2, "0")}` : state.selectedMonth;
      }

      function getHeaderCells(row, startIndex, endIndex, fallback = []) {
        if (!Array.isArray(row)) return fallback;
        const values = row.slice(startIndex, endIndex).map(normalizeCellText).filter(Boolean);
        return values.length ? values : fallback;
      }

      function buildTemplateDataFromRows(item, basicRow, bridge56Row, bridge67Row, headerRows = {}) {
        const createInitialFormData = window.PromoTemplateData?.createInitialFormData;
        if (!createInitialFormData) return null;

        const data = createInitialFormData();
        const monthLabel = item.month.replace(".", ".") + " 프로모션 현황";
        const amountHeaders = ["5만", "10만", "20만", "30만", "50만", "100만"];
        const basicHeaders = getHeaderCells(headerRows.basic, 6, 12, amountHeaders);
        const bridge56Headers = getHeaderCells(headerRows.bridge56, 3, 9, amountHeaders);
        const bridge67Headers = getHeaderCells(headerRows.bridge67, 3, 9, amountHeaders);

        data.promoDate = item.month.replace(".", ".") + "월";
        data.brandName = "삼성생명";
        data.mainTitle = monthLabel;
        data.subTitle = "대리점별 표준안내장";
        data.branchName = item.agency;
        data.branchNote = `${item.region} / ${item.branch}`;

        data.summaryLabel = "기준";
        data.summaryMax = normalizeCellText(basicRow[2]);
        data.summaryTitle = normalizeCellText(item.product || item.happyType || "프로모션");
        data.summaryLeft = normalizeCellText(bridge56Row[2]);
        data.summaryPill = item.status;
        data.summaryRight = normalizeCellText(bridge67Row[2]);

        data.section1Title = "기본가동";
        data.section1Round = "[13회]";
        data.section1Max = normalizeCellText(basicRow[5] || basicRow[2]);
        data.section1Headers = ["실적", ...basicHeaders].join(",");
        data.section1Rows = [
          ["1~13회", ...basicRow.slice(6, 12).map(normalizeCellText)].join("|"),
          ["14~28회", ...basicRow.slice(12, 18).map(normalizeCellText)].join("|")
        ].join("\n");

        data.section2Title = "5~6월브릿지";
        data.section2Round = "[13회]";
        data.section2Max = normalizeCellText(bridge56Row[2]);
        data.section2Headers = ["실적", ...bridge56Headers].join(",");
        data.section2Rows = [
          ["1~13회", ...bridge56Row.slice(3, 9).map(normalizeCellText)].join("|"),
          ["14~28회", ...bridge56Row.slice(9, 15).map(normalizeCellText)].join("|")
        ].join("\n");
        data.section2Note = "업로드 기준 수치 자동 반영";

        data.section3Title = "6~7월브릿지";
        data.section3Round = "[13회]";
        data.section3Headers = ["실적", ...bridge67Headers].join(",");
        data.section3Rows = [
          ["1~13회", ...bridge67Row.slice(3, 9).map(normalizeCellText)].join("|"),
          ["14~28회", ...bridge67Row.slice(9, 15).map(normalizeCellText)].join("|")
        ].join("\n");

        data.footerBanner = `${item.rm} · ${item.product}`;
        return data;
      }

      function parsePromotionWorkbook(fileName, workbook) {
        const mainSheetName = findSheetName(workbook, "6월_지점별 담당 분류_전체");
        const basicSheetName = findSheetName(workbook, "기본가동");
        const bridge56SheetName = findSheetName(workbook, "5~6월브릿지");
        const bridge67SheetName = findSheetName(workbook, "6~7월브릿지");
        const orgSheetName = findSheetName(workbook, "조직");

        if (!mainSheetName || !basicSheetName || !bridge56SheetName || !bridge67SheetName || !orgSheetName) {
          throw new Error("필수 시트를 찾지 못했습니다. 6월_지점별 담당 분류_전체, 기본가동, 5~6월브릿지, 6~7월브릿지, 조직 시트를 확인해주세요.");
        }

        const monthValue = getMonthDisplayFromWorkbook(workbook);
        const mainRows = sheetToRows(workbook.Sheets[mainSheetName]);
        const basicRows = sheetToRows(workbook.Sheets[basicSheetName]);
        const bridge56Rows = sheetToRows(workbook.Sheets[bridge56SheetName]);
        const bridge67Rows = sheetToRows(workbook.Sheets[bridge67SheetName]);
        const orgRows = sheetToRows(workbook.Sheets[orgSheetName]);
        const headerRows = {
          basic: basicRows[4] || [],
          bridge56: bridge56Rows[4] || [],
          bridge67: bridge67Rows[4] || []
        };

        const basicLookup = buildTableLookup(basicRows, 6);
        const bridge56Lookup = buildTableLookup(bridge56Rows, 6);
        const bridge67Lookup = buildTableLookup(bridge67Rows, 6);
        const orgLookup = buildOrgLookup(orgRows);

        const promotions = [];
        const templateForms = {};
        const dataRows = mainRows.slice(7).filter((row) => normalizeCellText(row[2]) || normalizeCellText(row[4]));

        dataRows.forEach((row, index) => {
          const code = normalizeCellText(row[2]);
          const agency = normalizeCellText(row[4]);
          if (!code || !agency) return;

          const key = buildPromotionKey(code, agency);
          const orgInfo = orgLookup.get(code);
          const basicRow = basicLookup.get(key);
          const bridge56Row = bridge56Lookup.get(key);
          const bridge67Row = bridge67Lookup.get(key);
          const finalConfirm = normalizeCellText(row[7]);
          const fallbackBranch = normalizeCellText(row[24]);
          const region = orgInfo?.divisionName || fallbackBranch || "미지정";
          const branch = orgInfo?.branchName || fallbackBranch || "미지정";

          let status = "확정";
          let errorReason = "";
          let templateData = null;

          if (!branch || branch === "미지정") {
            status = "오류";
            errorReason = "조직 매핑 없음";
          } else if (!basicRow || !bridge56Row || !bridge67Row) {
            status = "미확정";
          } else if (finalConfirm !== "○") {
            status = "미확정";
          } else {
            try {
              templateData = buildTemplateDataFromRows({
                agency,
                region,
                branch,
                product: normalizeCellText(row[5]) || "프로모션",
                happyType: normalizeCellText(row[6]),
                rm: normalizeCellText(row[25]) || "미배정",
                month: monthValue,
                status
              }, basicRow, bridge56Row, bridge67Row, headerRows);
            } catch (error) {
              console.error("안내장 데이터 변환 실패", { agency, code, error });
              status = "오류";
              errorReason = "안내장 데이터 변환 실패";
            }
          }

          const itemId = index + 1;
          promotions.push({
            id: itemId,
            code,
            agency,
            region,
            branch,
            rm: normalizeCellText(row[25]) || "미배정",
            product: normalizeCellText(row[5]) || "프로모션",
            happyType: normalizeCellText(row[6]),
            month: monthValue,
            status,
            errorReason,
            generated: false,
            updatedAt: getNowStamp(),
            noticeFile: `${agency}_안내장.png`
          });

          if (templateData) {
            templateForms[itemId] = templateData;
          }
        });

        return {
          promotions,
          templateForms,
          monthValue,
          fileName
        };

      async function downloadNoticeAsJpg(item) {
        const templateData = state.templateForms[item.id];
        if (!templateData) {
          throw new Error("표준안내장 데이터가 없어 다운로드할 수 없습니다.");
        }

        await new Promise((resolve, reject) => {
          const iframe = document.createElement("iframe");
          const cleanup = () => {
            iframe.remove();
          };

          const timeoutId = window.setTimeout(() => {
            cleanup();
            reject(new Error("표준안내장 다운로드 시간이 초과되었습니다."));
          }, 15000);
          iframe.src = "./template-package/promo-template.html?preview=1&export=1";
          iframe.style.position = "fixed";
          iframe.style.left = "-99999px";
          iframe.style.top = "0";
          iframe.style.width = "1400px";
          iframe.style.height = "2200px";
          iframe.style.opacity = "0";
          iframe.style.pointerEvents = "none";
          document.body.appendChild(iframe);

          iframe.addEventListener("load", async () => {
            try {
              const childWindow = iframe.contentWindow;
              if (!childWindow || typeof childWindow.applyExternalTemplateData !== "function" || typeof childWindow.exportBoardAsJpg !== "function") {
                throw new Error("표준안내장 다운로드 함수를 찾지 못했습니다.");
              }

              childWindow.applyExternalTemplateData(templateData);
              if (typeof childWindow.activatePreviewMode === "function") {
                childWindow.activatePreviewMode();
              }
              if (typeof childWindow.waitForNextPaint === "function") {
                await childWindow.waitForNextPaint();
              }
              await childWindow.exportBoardAsJpg(`${item.agency}_안내장.jpg`);
              window.clearTimeout(timeoutId);
              cleanup();
              resolve();
            } catch (error) {
              window.clearTimeout(timeoutId);
              cleanup();
              reject(error);
            }
          }, { once: true });
        });
      }

      async function handleDownloadClick(button) {
        const isEnabled = button.dataset.downloadEnabled === "true";
        const status = button.dataset.downloadStatus || "";
        const targetId = Number(button.dataset.downloadId);

        if (!isEnabled) {
          if (status === "미확정") {
            window.alert("미확정 건은 다운로드할 수 없습니다.");
          } else if (status === "오류") {
            window.alert("오류 건은 다운로드할 수 없습니다. 오류 사유를 먼저 확인해주세요.");
          } else {
            window.alert("표준안내장 생성과 전체 승인 후 다운로드할 수 있습니다.");
          }
          return false;
        }

        const item = state.promotions.find((promotion) => promotion.id === targetId);
        if (!item) {
          window.alert("다운로드 대상을 찾지 못했습니다.");
          return false;
        }

        try {
          await downloadNoticeAsJpg(item);
        } catch (error) {
          console.error(error);
          window.alert(`다운로드에 실패했습니다.\n${error.message}`);
        }

        return false;
      }

      window.handleDownloadClick = handleDownloadClick;

      function handleLogin() {
        const employeeId = document.getElementById("employeeId").value.trim();
        const password = document.getElementById("password").value.trim();
        const errorEl = document.getElementById("loginError");

        if (!isFiveDigitNumber(employeeId) || !isFiveDigitNumber(password)) {
          errorEl.textContent = "사번과 비밀번호는 5자리 숫자로 입력해주세요.";
          errorEl.hidden = false;
          return;
        }

        if (employeeId !== password) {
          errorEl.textContent = "비밀번호는 사번과 동일한 5자리여야 합니다.";
          errorEl.hidden = false;
          return;
        }

        errorEl.hidden = true;
        state.currentUser = buildUserFromEmployeeId(employeeId);
        state.showAllAgencies = false;
        state.statusFilter = "all";
        state.regionFilter = "all";
        state.branchFilter = "all";
        state.agencyKeyword = "";
        state.agencyQuery = "";
        state.selectedMonth = "2026.06";
        state.adminPanelOpen = false;
        state.period = "직전 6개월";
        state.previewItemId = null;
        state.showTemplatePreview = false;
        renderApp();
      }

      function bindLoginEvents() {
        document.getElementById("loginButton").addEventListener("click", handleLogin);
        ["employeeId", "password"].forEach((id) => {
          document.getElementById(id).addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
              handleLogin();
            }
          });
        });
      }

      function bindDashboardEvents() {
        const logoutButton = document.getElementById("logoutButton");
        if (logoutButton) {
          logoutButton.addEventListener("click", () => {
            state.currentUser = null;
            state.showAllAgencies = false;
            state.statusFilter = "all";
            state.regionFilter = "all";
            state.branchFilter = "all";
            state.agencyKeyword = "";
            state.agencyQuery = "";
            state.selectedMonth = "2026.06";
            state.adminPanelOpen = false;
            state.period = "직전 6개월";
            state.previewItemId = null;
            state.showTemplatePreview = false;
            renderApp();
          });
        }

        const toggleAgencyScope = document.getElementById("toggleAgencyScope");
        if (toggleAgencyScope) {
          toggleAgencyScope.addEventListener("click", () => {
            state.showAllAgencies = !state.showAllAgencies;
            state.regionFilter = "all";
            state.branchFilter = "all";
            state.agencyKeyword = "";
            state.agencyQuery = "";
            renderApp();
          });
        }

        document.querySelectorAll("[data-month]").forEach((button) => {
          button.addEventListener("click", () => {
            state.selectedMonth = button.dataset.month;
            state.regionFilter = "all";
            state.branchFilter = "all";
            state.agencyKeyword = "";
            state.agencyQuery = "";
            renderApp();
          });
        });

        const regionFilter = document.getElementById("regionFilter");
        if (regionFilter) {
          regionFilter.addEventListener("change", (event) => {
            state.regionFilter = event.target.value;
            state.branchFilter = "all";
            renderApp();
          });
        }

        const branchFilter = document.getElementById("branchFilter");
        if (branchFilter) {
          branchFilter.addEventListener("change", (event) => {
            state.branchFilter = event.target.value;
            renderApp();
          });
        }

        const agencyKeyword = document.getElementById("agencyKeyword");
        if (agencyKeyword) {
          agencyKeyword.addEventListener("input", (event) => {
            state.agencyKeyword = event.target.value;
          });
          agencyKeyword.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
              state.agencyQuery = event.target.value.trim();
              renderApp();
            }
          });
        }

        const applyAgencySearch = document.getElementById("applyAgencySearch");
        if (applyAgencySearch) {
          applyAgencySearch.addEventListener("click", () => {
            state.agencyQuery = state.agencyKeyword.trim();
            renderApp();
          });
        }

        const statusFilterSelect = document.getElementById("statusFilterSelect");
        if (statusFilterSelect) {
          statusFilterSelect.addEventListener("change", (event) => {
            state.statusFilter = event.target.value;
            renderApp();
          });
        }

        const toggleAdminPanel = document.getElementById("toggleAdminPanel");
        if (toggleAdminPanel) {
          toggleAdminPanel.addEventListener("click", () => {
            state.adminPanelOpen = !state.adminPanelOpen;
            renderApp();
          });
        }

        const uploadConfirmButton = document.getElementById("uploadConfirmButton");
        if (uploadConfirmButton) {
          uploadConfirmButton.addEventListener("click", async () => {
            const fileInput = document.getElementById("excelFileInput");
            const file = fileInput && fileInput.files && fileInput.files[0]
              ? fileInput.files[0]
              : null;

            if (!file) {
              window.alert("업로드할 엑셀 파일을 먼저 선택해주세요.");
              return;
            }

            if (!window.XLSX) {
              window.alert("엑셀 라이브러리를 불러오지 못했습니다. 페이지를 새로고침한 뒤 다시 시도해주세요.");
              return;
            }

            try {
              const buffer = await file.arrayBuffer();
              const workbook = window.XLSX.read(buffer, { type: "array" });
              const parsed = parsePromotionWorkbook(file.name, workbook);
              const nextStamp = getNowStamp();

              state.selectedUploadFileName = parsed.fileName;
              state.selectedMonth = parsed.monthValue || state.selectedMonth;
              state.excelUpdatedAt = nextStamp;
              state.generatedAt = "";
              state.approvedAt = "";
              state.previewItemId = null;
              state.showTemplatePreview = false;
              state.templateForms = parsed.templateForms;
              state.promotions = parsed.promotions.map((item) => ({
                ...item,
                generated: false,
                updatedAt: nextStamp
              }));
              renderApp();
              window.alert(`엑셀 업로드 반영이 완료되었습니다. 총 ${parsed.promotions.length}건입니다.`);
            } catch (error) {
              console.error(error);
              window.alert(`엑셀 업로드에 실패했습니다.\n${error.message}`);
            }
          });
        }

        const generateNoticesButton = document.getElementById("generateNoticesButton");
        if (generateNoticesButton) {
          generateNoticesButton.addEventListener("click", () => {
            const readyCount = state.promotions.filter((item) => canGenerateItem(item)).length;
            if (!readyCount) {
              window.alert("생성 가능한 확정 데이터가 없습니다. 먼저 엑셀 업로드를 반영해주세요.");
              return;
            }

            const nextStamp = getNowStamp();
            state.generatedAt = nextStamp;
            state.approvedAt = "";
            state.previewItemId = null;
            state.promotions = state.promotions.map((item) => ({
              ...item,
              generated: canGenerateItem(item),
              updatedAt: canGenerateItem(item) ? nextStamp : item.updatedAt
            }));
            renderApp();
          });
        }

        const approveAllButton = document.getElementById("approveAllButton");
        if (approveAllButton) {
          approveAllButton.addEventListener("click", () => {
            if (!state.generatedAt) return;
            state.approvedAt = getNowStamp();
            renderApp();
          });
        }

        document.querySelectorAll("[data-preview-id]").forEach((button) => {
          button.addEventListener("click", () => {
            state.previewItemId = Number(button.dataset.previewId);
            renderApp();
          });
        });

        const closePreviewModal = document.getElementById("closePreviewModal");
        if (closePreviewModal) {
          closePreviewModal.addEventListener("click", () => {
            state.previewItemId = null;
            renderApp();
          });
        }

        const previewModal = document.getElementById("previewModal");
        if (previewModal) {
          previewModal.addEventListener("click", (event) => {
            if (event.target.id === "previewModal") {
              state.previewItemId = null;
              renderApp();
            }
          });
        }

        const previewTemplateFrame = document.getElementById("previewTemplateFrame");
        if (previewTemplateFrame) {
          syncTemplateFrame(previewTemplateFrame, getPreviewTemplateData());
        }

        const openTemplatePreviewButton = document.getElementById("openTemplatePreviewButton");
        if (openTemplatePreviewButton) {
          openTemplatePreviewButton.addEventListener("click", () => {
            state.showTemplatePreview = true;
            renderApp();
          });
        }

        const closeTemplatePreviewModal = document.getElementById("closeTemplatePreviewModal");
        if (closeTemplatePreviewModal) {
          closeTemplatePreviewModal.addEventListener("click", () => {
            state.showTemplatePreview = false;
            renderApp();
          });
        }

        const templatePreviewModal = document.getElementById("templatePreviewModal");
        if (templatePreviewModal) {
          templatePreviewModal.addEventListener("click", (event) => {
            if (event.target.id === "templatePreviewModal") {
              state.showTemplatePreview = false;
              renderApp();
            }
          });
        }

        const templatePreviewFrame = document.getElementById("templatePreviewFrame");
        if (templatePreviewFrame) {
          syncTemplateFrame(templatePreviewFrame, getActiveTemplateData());
        }
      }

      function renderApp() {
        const app = document.getElementById("app");
        app.innerHTML = state.currentUser ? renderPromotionPage() : renderLoginScreen();
        if (state.currentUser) {
          bindDashboardEvents();
        } else {
          bindLoginEvents();
        }
      }

      renderApp();
    </script>
  </body>
</html>
