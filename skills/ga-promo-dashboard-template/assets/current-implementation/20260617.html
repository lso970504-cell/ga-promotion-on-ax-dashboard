      function bindFilePickerLabel(inputId, labelId, emptyText, buttonId) {
        const input = document.getElementById(inputId);
        const label = document.getElementById(labelId);
        const button = buttonId ? document.getElementById(buttonId) : null;
        if (!input || !label) return;

        const resolvedEmptyText = inputId === "excelFileInput" ? "파일 선택" : emptyText;
        if (inputId === "excelFileInput") {
          input.setAttribute("aria-label", "엑셀 파일 선택");
        }

        const syncLabel = () => {
          const file = input.files && input.files[0] ? input.files[0] : null;
          label.textContent = file ? file.name : resolvedEmptyText;
          label.title = file ? file.name : resolvedEmptyText;
          if (button) {
            button.disabled = !file;
          }
        };

        syncLabel();
        input.addEventListener("change", syncLabel);
      }

      function handleLogin() {
        const employeeId = document.getElementById("employeeId").value.trim();
        const password = document.getElementById("password").value.trim();
        const errorEl = document.getElementById("loginError");

        if (!isFiveDigitNumber(employeeId) || !isFiveDigitNumber(password)) {
          errorEl.textContent = "사번과 비밀번호는 5자리 숫자로 입력해주세요.";
          errorEl.hidden = false;
          return;
        }

        if (employeeId !== password) {
          errorEl.textContent = "비밀번호는 사번과 동일한 5자리여야 합니다.";
          errorEl.hidden = false;
          return;
        }

        const matchedUser = buildUserFromEmployeeId(employeeId);
        if (!matchedUser) {
          errorEl.textContent = "로그인 가능한 사번 목록이 아닙니다. 업로드된 권한 사번 목록을 확인해주세요.";
          errorEl.hidden = false;
          return;
        }

        errorEl.hidden = true;
        state.currentUser = matchedUser;
        state.showAllAgencies = false;
        state.statusFilter = "all";
        state.regionFilter = "all";
        state.branchFilter = "all";
        state.agencyKeyword = "";
        state.agencyQuery = "";
        state.selectedMonth = "2026.06";
        state.adminPanelOpen = false;
        state.period = "직전 6개월";
        state.previewItemId = null;
        state.showTemplatePreview = false;
        renderApp();
      }

      function bindLoginEvents() {
        document.getElementById("loginButton").addEventListener("click", handleLogin);
        ["employeeId", "password"].forEach((id) => {
          document.getElementById(id).addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
              handleLogin();
            }
          });
        });
      }

      function bindDashboardEvents() {
        const logoutButton = document.getElementById("logoutButton");
        if (logoutButton) {
          logoutButton.addEventListener("click", () => {
            state.currentUser = null;
            state.showAllAgencies = false;
            state.statusFilter = "all";
            state.regionFilter = "all";
            state.branchFilter = "all";
            state.agencyKeyword = "";
            state.agencyQuery = "";
            state.selectedMonth = "2026.06";
            state.adminPanelOpen = false;
            state.period = "직전 6개월";
            state.previewItemId = null;
            state.showTemplatePreview = false;
            renderApp();
          });
        }

        const toggleAgencyScope = document.getElementById("toggleAgencyScope");
        if (toggleAgencyScope) {
          toggleAgencyScope.addEventListener("click", () => {
            state.showAllAgencies = !state.showAllAgencies;
            state.regionFilter = "all";
            state.branchFilter = "all";
            state.agencyKeyword = "";
            state.agencyQuery = "";
            renderApp();
          });
        }

        document.querySelectorAll("[data-month]").forEach((button) => {
          button.addEventListener("click", () => {
            state.selectedMonth = button.dataset.month;
            state.regionFilter = "all";
            state.branchFilter = "all";
            state.agencyKeyword = "";
            state.agencyQuery = "";
            syncMonthScopedUploadState(state.selectedMonth);
            saveStoredPromoDashboardState();
            renderApp();
          });
        });

        const regionFilter = document.getElementById("regionFilter");
        if (regionFilter) {
          regionFilter.addEventListener("change", (event) => {
            state.regionFilter = event.target.value;
            state.branchFilter = "all";
            renderApp();
          });
        }

        const branchFilter = document.getElementById("branchFilter");
        if (branchFilter) {
          branchFilter.addEventListener("change", (event) => {
            state.branchFilter = event.target.value;
            renderApp();
          });
        }

        const agencyKeyword = document.getElementById("agencyKeyword");
        if (agencyKeyword) {
          agencyKeyword.addEventListener("input", (event) => {
            state.agencyKeyword = event.target.value;
          });
          agencyKeyword.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
              state.agencyQuery = event.target.value.trim();
              renderApp();
            }
          });
        }

        const applyAgencySearch = document.getElementById("applyAgencySearch");
        if (applyAgencySearch) {
          applyAgencySearch.addEventListener("click", () => {
            state.agencyQuery = state.agencyKeyword.trim();
            renderApp();
          });
        }

        document.querySelectorAll("[data-sort-field]").forEach((button) => {
          button.addEventListener("click", () => {
            const field = button.dataset.sortField;
            if (!field) return;

            if (state.sortField === field) {
              state.sortDirection = state.sortDirection === "desc" ? "asc" : "desc";
            } else {
              state.sortField = field;
              state.sortDirection = field === "status" ? "desc" : "asc";
            }

            renderApp();
          });
        });

        const toggleAdminPanel = document.getElementById("toggleAdminPanel");
        if (toggleAdminPanel) {
          toggleAdminPanel.addEventListener("click", () => {
            state.adminPanelOpen = !state.adminPanelOpen;
            renderApp();
          });
        }

        const toggleAdminPreviewList = document.getElementById("toggleAdminPreviewList");
        if (toggleAdminPreviewList) {
          toggleAdminPreviewList.addEventListener("click", () => {
            state.showAdminPreviewList = !state.showAdminPreviewList;
            renderApp();
          });
        }

        bindFilePickerLabel("excelFileInput", "excelFileInputLabel", "엑셀 파일 선택", "uploadConfirmButton");
        bindFilePickerLabel("sampleTemplateFileInput", "sampleTemplateFileInputLabel", "샘플양식 선택");
        bindFilePickerLabel("hqEmployeeFileInput", "hqEmployeeFileInputLabel", "권한 파일 선택");
        bindFilePickerLabel("resourcePromoFileInput", "resourcePromoFileInputLabel", "파일 선택");
        bindFilePickerLabel("refundFileInput", "refundFileInputLabel", "파일 선택");

        const hqEmployeeUploadButton = document.getElementById("hqEmployeeUploadButton");
        if (hqEmployeeUploadButton) {
          hqEmployeeUploadButton.addEventListener("click", async () => {
            const fileInput = document.getElementById("hqEmployeeFileInput");
            const file = fileInput && fileInput.files && fileInput.files[0]
              ? fileInput.files[0]
              : null;

            if (!file) {
              window.alert("업로드할 권한 사번 파일을 먼저 선택해주세요.");
              return;
            }

            if (!window.XLSX) {
              window.alert("엑셀 라이브러리를 불러오지 못했습니다. 페이지를 새로고침한 뒤 다시 시도해주세요.");
              return;
            }

            try {
              const buffer = await file.arrayBuffer();
              const workbook = window.XLSX.read(buffer, { type: "array" });
              const parsed = parseLoginUserWorkbook(file.name, workbook);
              const nextStamp = getNowStamp();

              state.uploadedLoginUsers = parsed.users;
              state.loginUserUpdatedAt = nextStamp;
              saveStoredLoginUsers(parsed.users, nextStamp);
              renderApp();
              window.alert(`권한 사번 목록 ${parsed.users.length}건이 반영되었습니다.`);
            } catch (error) {
              console.error(error);
              window.alert(`권한 사번 업로드에 실패했습니다.\n${error.message}`);
            }
          });
        }

        const sampleTemplateUploadButton = document.getElementById("sampleTemplateUploadButton");
        if (sampleTemplateUploadButton) {
          sampleTemplateUploadButton.addEventListener("click", () => {
            const fileInput = document.getElementById("sampleTemplateFileInput");
            const file = fileInput && fileInput.files && fileInput.files[0]
              ? fileInput.files[0]
              : null;

            if (!file) {
              window.alert("샘플양식으로 사용할 파일을 먼저 선택해주세요.");
              return;
            }

            rememberUploadedFile(file, "sampleTemplateFileName", "sampleTemplateDownloadUrl", "sampleTemplateUpdatedAt");
            renderApp();
            window.alert(`${file.name} 샘플양식이 반영되었습니다. 관리자 카드에서 바로 다시 다운로드할 수 있습니다.`);
          });
        }

        const resourcePromoUploadButton = document.getElementById("resourcePromoUploadButton");
        if (resourcePromoUploadButton) {
          resourcePromoUploadButton.addEventListener("click", () => {
            const fileInput = document.getElementById("resourcePromoFileInput");
            const file = fileInput && fileInput.files && fileInput.files[0]
              ? fileInput.files[0]
              : null;

            if (!file) {
              window.alert("전체대리점 프로모션현황 파일을 먼저 선택해주세요.");
              return;
            }

            rememberMonthlyUploadFile(file, state.selectedMonth);
            const nextStamp = getNowStamp();
            state.selectedUploadFileName = file.name;
            state.excelUpdatedAt = nextStamp;
            state.monthUploadFileMap[state.selectedMonth] = file.name;
            state.monthExcelUpdatedAtMap[state.selectedMonth] = nextStamp;
            saveStoredPromoDashboardState();
            renderApp();
            window.alert("전체대리점 프로모션현황 파일이 실시간 반영되었습니다.");
          });
        }

        const refundUploadButton = document.getElementById("refundUploadButton");
        if (refundUploadButton) {
          refundUploadButton.addEventListener("click", () => {
            const fileInput = document.getElementById("refundFileInput");
            const file = fileInput && fileInput.files && fileInput.files[0]
              ? fileInput.files[0]
              : null;

            if (!file) {
              window.alert("상품별 예상해약환급금 엑셀 파일을 먼저 선택해주세요.");
              return;
            }

            rememberUploadedFile(file, "refundFileName", "refundDownloadUrl", "refundUpdatedAt");
            renderApp();
            window.alert("상품별 예상해약환급금 엑셀 파일이 실시간 반영되었습니다.");
          });
        }

        const uploadConfirmButton = document.getElementById("uploadConfirmButton");
        if (uploadConfirmButton) {
          uploadConfirmButton.addEventListener("click", async () => {
            const fileInput = document.getElementById("excelFileInput");
            const file = fileInput && fileInput.files && fileInput.files[0]
              ? fileInput.files[0]
              : null;

            if (!file) {
              window.alert("업로드할 엑셀 파일을 먼저 선택해주세요.");
              return;
            }

            if (!window.XLSX) {
              window.alert("엑셀 라이브러리를 불러오지 못했습니다. 페이지를 새로고침한 뒤 다시 시도해주세요.");
              return;
            }

            try {
              const buffer = await file.arrayBuffer();
              const workbook = window.XLSX.read(buffer, { type: "array" });
              const parsed = parsePromotionWorkbook(file.name, workbook);
              const nextStamp = getNowStamp();

              const targetMonth = normalizeMonthValue(parsed.monthValue || state.selectedMonth);
              const merged = mergeUploadedPromotionsByMonth(parsed, targetMonth, nextStamp);

              state.selectedMonth = targetMonth;
              state.previewItemId = null;
              state.showTemplatePreview = false;
              state.templateForms = merged.templateForms;
              state.promotions = merged.promotions;
              state.monthMetaMap[targetMonth] = {
                ...(parsed.uploadMeta || createDefaultUploadMeta()),
                month: targetMonth,
                generatedTitle: toPromotionTitle(targetMonth)
              };
              state.monthBlocksMap[targetMonth] = parsed.uploadBlocks || createDefaultUploadBlocks();
              state.monthNoticeMap[targetMonth] = parsed.uploadNoticeLines || createDefaultNoticeLines();
              state.monthUploadFileMap[targetMonth] = parsed.fileName;
              rememberMonthlyUploadFile(file, targetMonth);
              state.monthExcelUpdatedAtMap[targetMonth] = nextStamp;
              state.monthGeneratedAtMap[targetMonth] = "";
              state.monthApprovedAtMap[targetMonth] = "";
              state.monthUploadModeMap[targetMonth] = parsed.uploadMode || "legacy";
              syncMonthScopedUploadState(targetMonth);
              saveStoredPromoDashboardState();
              renderApp();
              if (parsed.uploadMode === "simple") {
                window.alert(`입력 샘플 업로드가 완료되었습니다. 블록 ${state.uploadBlocks.length}개와 유의사항 ${state.uploadNoticeLines.length}줄이 반영되었습니다.`);
              } else {
                window.alert(`엑셀 업로드 반영이 완료되었습니다. 총 ${parsed.promotions.length}건입니다.`);
              }
            } catch (error) {
              console.error(error);
              window.alert(`엑셀 업로드에 실패했습니다.\n${error.message}`);
            }
          });
        }

        const generateNoticesButton = document.getElementById("generateNoticesButton");
        if (generateNoticesButton) {
          generateNoticesButton.addEventListener("click", () => {
            const readyCount = state.promotions.filter((item) => item.month === state.selectedMonth && canGenerateItem(item)).length;
            if (!readyCount) {
              window.alert("생성 가능한 확정 데이터가 없습니다. 먼저 엑셀 업로드를 반영해주세요.");
              return;
            }

            const nextStamp = getNowStamp();
            state.generatedAt = nextStamp;
            state.monthGeneratedAtMap[state.selectedMonth] = nextStamp;
            state.monthApprovedAtMap[state.selectedMonth] = "";
            state.approvedAt = "";
            state.previewItemId = null;
            state.promotions = state.promotions.map((item) => ({
              ...item,
              generated: item.month === state.selectedMonth ? canGenerateItem(item) : item.generated,
              updatedAt: item.month === state.selectedMonth && canGenerateItem(item) ? nextStamp : item.updatedAt
            }));
            saveStoredPromoDashboardState();
            renderApp();
          });
        }

        const approveAllButton = document.getElementById("approveAllButton");
        if (approveAllButton) {
          approveAllButton.addEventListener("click", () => {
            if (!state.generatedAt) return;
            state.approvedAt = getNowStamp();
            state.monthApprovedAtMap[state.selectedMonth] = state.approvedAt;
            saveStoredPromoDashboardState();
            renderApp();
          });
        }

        document.querySelectorAll("[data-preview-id]").forEach((button) => {
          button.addEventListener("click", () => {
            state.previewItemId = Number(button.dataset.previewId);
            renderApp();
          });
        });

        const closePreviewModal = document.getElementById("closePreviewModal");
        if (closePreviewModal) {
          closePreviewModal.addEventListener("click", () => {
            state.previewItemId = null;
            renderApp();
          });
        }

        const previewModal = document.getElementById("previewModal");
        if (previewModal) {
          previewModal.addEventListener("click", (event) => {
            if (event.target.id === "previewModal") {
              state.previewItemId = null;
              renderApp();
            }
          });
        }

        const previewTemplateFrame = document.getElementById("previewTemplateFrame");
        if (previewTemplateFrame) {
          syncTemplateFrame(previewTemplateFrame, getPreviewTemplateData());
        }

        const openTemplatePreviewButton = document.getElementById("openTemplatePreviewButton");
        if (openTemplatePreviewButton) {
          openTemplatePreviewButton.addEventListener("click", () => {
            state.showTemplatePreview = true;
            renderApp();
          });
        }

        const closeTemplatePreviewModal = document.getElementById("closeTemplatePreviewModal");
        if (closeTemplatePreviewModal) {
          closeTemplatePreviewModal.addEventListener("click", () => {
            state.showTemplatePreview = false;
            renderApp();
          });
        }

        const templatePreviewModal = document.getElementById("templatePreviewModal");
        if (templatePreviewModal) {
          templatePreviewModal.addEventListener("click", (event) => {
            if (event.target.id === "templatePreviewModal") {
              state.showTemplatePreview = false;
              renderApp();
            }
          });
        }

        const templatePreviewFrame = document.getElementById("templatePreviewFrame");
        if (templatePreviewFrame) {
          syncTemplateFrame(templatePreviewFrame, getActiveTemplateData());
        }

        const embeddedTemplateFrame = document.getElementById("embeddedTemplateFrame");
        if (embeddedTemplateFrame) {
          syncTemplateFrame(embeddedTemplateFrame, getActiveTemplateData());
        }
      }

      function renderApp() {
        const app = document.getElementById("app");
        app.innerHTML = state.currentUser ? renderPromotionPage() : renderLoginScreen();
        if (state.currentUser) {
          bindDashboardEvents();
        } else {
          bindLoginEvents();
        }
      }

      renderApp();
    </script>
  </body>
</html>
