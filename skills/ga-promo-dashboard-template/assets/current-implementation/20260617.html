<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GA 프로모션 ON AX 대시보드</title>
    <style>
      :root {
        --brand-950: #0a2a66;
        --brand-900: #10387e;
        --brand-700: #1a57b8;
        --brand-500: #4d8dff;
        --ink-900: #13233f;
        --ink-700: #41506c;
        --ink-500: #697997;
        --line: #d8e1f0;
        --surface: #f3f7fd;
        --card: #ffffff;
        --success: #18a957;
        --warning: #f1b80b;
        --danger: #da3848;
        --shadow: 0 18px 42px rgba(14, 34, 73, 0.12);
        --radius-xl: 28px;
        --radius-lg: 20px;
        --radius-md: 14px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Malgun Gothic", sans-serif;
        color: var(--ink-900);
        background:
          radial-gradient(circle at top left, rgba(77, 141, 255, 0.18), transparent 24rem),
          radial-gradient(circle at top right, rgba(10, 42, 102, 0.08), transparent 20rem),
          linear-gradient(180deg, #eef4ff 0%, #f6f9ff 52%, #edf3fb 100%);
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app-shell {
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0)),
          repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.14) 0 1px, transparent 1px 120px);
      }

      .screen {
        min-height: 100vh;
      }

      .login-screen {
        display: grid;
        place-items: center;
        padding: 36px 28px;
      }

      .login-layout {
        width: min(1100px, 100%);
        display: grid;
        grid-template-columns: minmax(0, 1.05fr) minmax(360px, 0.82fr);
        gap: 28px;
      }

      .hero-panel,
      .login-card,
      .dashboard-card,
      .panel {
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.75);
        box-shadow: var(--shadow);
      }

      .hero-panel {
        position: relative;
        overflow: hidden;
        border-radius: 36px;
        padding: 54px 48px;
        background:
          radial-gradient(circle at 18% 22%, rgba(255, 255, 255, 0.18), transparent 22rem),
          linear-gradient(145deg, rgba(8, 38, 95, 0.98), rgba(20, 94, 178, 0.92));
        color: #fff;
      }

      .hero-panel::before,
      .hero-panel::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
      }

      .hero-panel::before {
        width: 260px;
        height: 260px;
        top: -72px;
        right: -72px;
      }

      .hero-panel::after {
        width: 180px;
        height: 180px;
        bottom: -56px;
        left: -56px;
      }

      .brand-badge {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 0;
        padding: 14px 22px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .hero-title {
        position: relative;
        margin: 28px 0 18px;
        font-size: clamp(38px, 5vw, 58px);
        line-height: 1.04;
        letter-spacing: -0.03em;
      }

      .hero-copy {
        position: relative;
        margin: 0;
        max-width: 520px;
        color: rgba(255, 255, 255, 0.82);
        font-size: 18px;
        line-height: 1.75;
      }

      .hero-note-list {
        position: relative;
        display: grid;
        gap: 12px;
        margin-top: 34px;
        max-width: 470px;
      }

      .hero-note-item {
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 56px;
        padding: 14px 18px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(10px);
        color: rgba(255, 255, 255, 0.9);
        font-size: 15px;
        line-height: 1.55;
      }

      .hero-note-item::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #ffffff;
        box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.18);
        flex: 0 0 auto;
      }

      .login-card {
        position: relative;
        border-radius: 36px;
        padding: 38px 34px 34px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.99), rgba(245, 249, 255, 0.98));
      }

      .login-card::before {
        content: "";
        position: absolute;
        inset: 0 auto auto 0;
        width: 100%;
        height: 6px;
        border-radius: 36px 36px 0 0;
        background: linear-gradient(90deg, var(--brand-900), #3e8dff);
      }

      .card-label {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 999px;
        background: #eef4ff;
        color: var(--brand-900);
        font-size: 12px;
        font-weight: 700;
      }

      .login-card h2 {
        margin: 16px 0 8px;
        font-size: 34px;
        letter-spacing: -0.02em;
      }

      .login-card p {
        margin: 0 0 20px;
        color: var(--ink-700);
        line-height: 1.6;
      }

      .login-intro {
        font-size: 15px;
      }

      .field-group {
        display: grid;
        gap: 8px;
        margin-top: 18px;
      }

      .field-group label {
        font-size: 14px;
        font-weight: 700;
      }

      .field {
        width: 100%;
        height: 58px;
        padding: 0 18px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: #fcfdff;
        color: var(--ink-900);
      }

      .field:focus {
        outline: 2px solid rgba(77, 141, 255, 0.28);
        border-color: var(--brand-500);
      }

      .button-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 24px;
        justify-content: center;
      }

      .primary-button,
      .secondary-button,
      .ghost-button,
      .status-button {
        border: 0;
        cursor: pointer;
        transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      }

      .primary-button:hover,
      .secondary-button:hover,
      .ghost-button:hover,
      .status-button:hover {
        transform: translateY(-1px);
      }

      .primary-button {
        min-width: 150px;
        height: 52px;
        padding: 0 18px;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--brand-900), var(--brand-700));
        color: #fff;
        box-shadow: 0 12px 24px rgba(18, 70, 150, 0.22);
      }

      .secondary-button,
      .ghost-button {
        min-width: 150px;
        height: 52px;
        padding: 0 18px;
        border-radius: 14px;
        background: #eff4fb;
        color: var(--brand-900);
      }

      .helper-box {
        margin-top: 24px;
        padding: 20px;
        border-radius: 20px;
        background: linear-gradient(180deg, #f7faff, #eef4fd);
        border: 1px solid #e1eaf7;
      }

      .helper-box h3 {
        margin: 0 0 12px;
        font-size: 14px;
      }

      .helper-box p {
        margin: 6px 0;
        font-size: 14px;
      }

      .login-subcopy {
        display: block;
        margin-top: 8px;
        color: var(--ink-500);
        font-size: 13px;
      }

      .error-text {
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(218, 56, 72, 0.1);
        color: #ba2332;
        font-size: 14px;
      }

      .dashboard-screen {
        padding: 32px 28px 40px;
      }

      .dashboard-shell {
        width: min(1400px, 100%);
        margin: 0 auto;
        display: grid;
        gap: 24px;
      }

      .dashboard-card,
      .panel {
        border-radius: var(--radius-xl);
      }

      .dashboard-card {
        padding: 34px 36px;
        border: 1px solid rgba(214, 225, 242, 0.9);
      }

      .dashboard-header {
        display: grid;
        gap: 24px;
        background:
          radial-gradient(circle at top right, rgba(255, 255, 255, 0.12), transparent 18rem),
          linear-gradient(135deg, rgba(10, 42, 102, 0.98), rgba(18, 89, 177, 0.94)),
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0));
        color: #fff;
      }

      .header-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
      }

      .header-titleblock {
        max-width: 920px;
      }

      .dashboard-header h1 {
        margin: 12px 0 0;
        font-size: clamp(40px, 4.9vw, 58px);
        line-height: 1.02;
        white-space: nowrap;
        letter-spacing: -0.045em;
      }

      .header-subtitles {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 16px;
      }

      .header-subtitle {
        display: inline-flex;
        align-items: center;
        min-height: 44px;
        padding: 11px 16px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.16);
        font-size: 15px;
        font-weight: 700;
      }

      .header-copy {
        margin: 14px 0 0;
        max-width: 800px;
        color: rgba(255, 255, 255, 0.88);
        font-size: 17px;
        line-height: 1.68;
      }

      .header-actions {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
        justify-content: flex-start;
      }

      .header-date-box {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px 18px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.18);
      }

      .header-date-label {
        color: rgba(255, 255, 255, 0.78);
        font-size: 13px;
        font-weight: 700;
      }

      .header-date-value {
        color: #fff;
        font-size: 19px;
        font-weight: 800;
        letter-spacing: -0.03em;
        white-space: nowrap;
      }

      .month-tabs {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .month-tab {
        min-width: 104px;
        height: 46px;
        padding: 0 18px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.84);
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease;
      }

      .month-tab:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.14);
      }

      .month-tab.active {
        background: #fff;
        color: var(--brand-900);
        font-weight: 700;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
      }

      .summary-card {
        padding: 28px 26px;
        border-radius: 24px;
        background:
          linear-gradient(180deg, #ffffff, #f8fbff);
        border: 1px solid #dbe6f6;
        box-shadow: 0 12px 24px rgba(16, 56, 126, 0.05);
      }

      .summary-card span {
        display: block;
        font-size: 15px;
        font-weight: 700;
        color: var(--ink-500);
      }

      .summary-card strong {
        display: block;
        margin-top: 12px;
        font-size: 42px;
        color: var(--brand-950);
        letter-spacing: -0.04em;
      }

      .content-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.65fr) minmax(320px, 0.95fr);
        gap: 20px;
      }

      .stack-section {
        display: grid;
        gap: 20px;
      }

      .dashboard-board {
        display: grid;
        grid-template-columns: 1.15fr 0.95fr;
        gap: 20px;
      }

      .board-card {
        padding: 24px;
        border-radius: 24px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(244, 248, 255, 0.98));
        border: 1px solid #e4ebf6;
      }

      .board-card h2,
      .board-card h3 {
        margin: 0;
      }

      .board-card p {
        margin: 10px 0 0;
        color: var(--ink-700);
        line-height: 1.6;
      }

      .board-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }

      .board-stat {
        padding: 18px;
        border-radius: 20px;
        background: #fff;
        border: 1px solid #e7edf8;
      }

      .board-stat span {
        display: block;
        font-size: 12px;
        color: var(--ink-500);
      }

      .board-stat strong {
        display: block;
        margin-top: 8px;
        font-size: 26px;
        color: var(--brand-950);
      }

      .board-stat em {
        display: block;
        margin-top: 6px;
        font-style: normal;
        color: var(--ink-700);
        font-size: 13px;
      }

      .timeline-list {
        display: grid;
        gap: 12px;
        margin-top: 18px;
        max-height: 338px;
        overflow-y: auto;
        padding-right: 6px;
      }

      .timeline-item {
        display: grid;
        grid-template-columns: 92px 1fr;
        gap: 14px;
        align-items: start;
        padding: 14px 16px;
        border-radius: 18px;
        background: #fff;
        border: 1px solid #e7edf8;
      }

      .timeline-time {
        color: var(--brand-900);
        font-size: 12px;
        font-weight: 700;
      }

      .timeline-body strong {
        display: block;
        font-size: 14px;
      }

      .timeline-body span {
        display: block;
        margin-top: 4px;
        color: var(--ink-500);
        font-size: 12px;
      }

      .panel {
        padding: 30px 30px 32px;
        border: 1px solid rgba(214, 225, 242, 0.95);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 251, 255, 0.98));
      }

      .panel-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 22px;
      }

      .panel-head h2 {
        margin: 0;
        font-size: 34px;
        letter-spacing: -0.04em;
      }

      .panel-head p {
        margin: 10px 0 0;
        color: var(--ink-700);
        font-size: 17px;
        line-height: 1.65;
      }

      .panel-date {
        margin: 12px 0 0;
        color: var(--brand-900);
        font-size: 17px;
        font-weight: 700;
      }

      .panel-head-meta {
        margin-left: auto;
        text-align: right;
        align-self: flex-end;
      }

      .panel-head-meta .panel-date {
        margin: 0;
      }

      .panel-role-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 116px;
        height: 40px;
        padding: 0 16px;
        border-radius: 999px;
        background: #edf3ff;
        color: var(--brand-900);
        font-size: 14px;
        font-weight: 700;
      }

      .filter-stack {
        display: grid;
        gap: 12px;
        margin-bottom: 22px;
        padding: 18px;
        border-radius: 22px;
        background: linear-gradient(180deg, #f8fbff, #f3f7ff);
        border: 1px solid #e2eaf7;
      }

      .search-filter-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1.15fr) 110px;
        gap: 14px;
        align-items: end;
      }

      .search-filter-field {
        display: grid;
        gap: 10px;
      }

      .search-filter-field label {
        color: var(--ink-700);
        font-size: 15px;
        font-weight: 700;
      }

      .search-filter-control {
        width: 100%;
        height: 62px;
        padding: 0 20px;
        border: 1px solid #dbe5f3;
        border-radius: 18px;
        background: #fff;
        color: var(--brand-950);
        font-size: 17px;
        font-weight: 700;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
      }

      .search-filter-control:focus {
        outline: none;
        border-color: #9ebcf2;
        box-shadow: 0 0 0 4px rgba(77, 141, 255, 0.14);
      }

      .search-filter-button {
        width: 100%;
        height: 62px;
        border: 0;
        border-radius: 18px;
        background: linear-gradient(180deg, #304f98, #203b7c);
        color: #fff;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 12px 22px rgba(32, 59, 124, 0.18);
      }

      .filter-helper-row {
        display: flex;
        justify-content: flex-end;
      }

      .promotion-download-row {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      .promotion-download-row .resource-button {
        min-width: 172px;
      }

      .search-filter-toggle {
        width: 220px;
        height: 58px;
        border: 1px solid #dbe5f3;
        border-radius: 18px;
        background: #fff;
        color: var(--brand-900);
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
      }

      .table-wrap {
        overflow: auto;
        max-height: 620px;
        border: 1px solid #dbe5f3;
        border-radius: 22px;
        scrollbar-width: auto;
        scrollbar-color: #9db0d8 #eef3fb;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }

      .table-wrap::-webkit-scrollbar {
        width: 12px;
        height: 12px;
      }

      .table-wrap::-webkit-scrollbar-track {
        background: #eef3fb;
        border-radius: 999px;
      }

      .table-wrap::-webkit-scrollbar-thumb {
        background: #9db0d8;
        border-radius: 999px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 980px;
        background: #fff;
        table-layout: fixed;
      }

      thead {
        background: linear-gradient(180deg, #f8fbff, #f1f6ff);
      }

      th,
      td {
        padding: 22px 18px;
        border-bottom: 1px solid #edf2fa;
        text-align: left;
        font-size: 16px;
        vertical-align: middle;
      }

      th {
        color: var(--ink-700);
        font-weight: 700;
        font-size: 16px;
        position: sticky;
        top: 0;
        z-index: 1;
        background: linear-gradient(180deg, #f8fbff, #f1f6ff);
      }

      tr:last-child td {
        border-bottom: 0;
      }

      tbody tr:nth-child(even) {
        background: rgba(244, 248, 255, 0.66);
      }

      tbody tr:hover {
        background: rgba(232, 241, 255, 0.82);
      }

      th:nth-child(1),
      td:nth-child(1) {
        width: 18%;
      }

      th:nth-child(2),
      td:nth-child(2) {
        width: 18%;
      }

      th:nth-child(3),
      td:nth-child(3) {
        width: 28%;
      }

      th:nth-child(4),
      td:nth-child(4) {
        width: 14%;
        text-align: center;
      }

      th:nth-child(5),
      td:nth-child(5) {
        width: 22%;
      }

      .agency-cell strong,
      .file-list strong {
        display: block;
        font-size: 19px;
        line-height: 1.4;
      }

      .region-cell,
      .branch-cell {
        font-weight: 700;
        color: var(--brand-950);
        font-size: 17px;
      }

      .status-cell,
      .notice-cell,
      .updated-cell {
        text-align: center;
      }

      th:nth-child(4) .sort-header-button,
      th:nth-child(5) .sort-header-button {
        width: 100%;
        justify-content: center;
      }

      .agency-cell span,
      .file-list span,
      .mini-note {
        display: block;
        margin-top: 4px;
        font-size: 14px;
        color: var(--ink-500);
      }

      .sort-header-button {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 0;
        background: transparent;
        color: var(--ink-700);
        font-size: 16px;
        font-weight: 700;
        padding: 0;
        cursor: pointer;
      }

      .sort-header-button.active {
        color: var(--brand-900);
      }

      .traffic {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 11px 16px;
        border-radius: 999px;
        font-weight: 700;
        font-size: 15px;
      }

      .traffic::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 999px;
      }

      .traffic.confirmed {
        background: rgba(24, 169, 87, 0.1);
        color: #127841;
      }

      .traffic.confirmed::before {
        background: var(--success);
        box-shadow: 0 0 0 5px rgba(24, 169, 87, 0.14);
      }

      .traffic.pending {
        background: rgba(241, 184, 11, 0.14);
        color: #8b6905;
      }

      .traffic.pending::before {
        background: var(--warning);
        box-shadow: 0 0 0 5px rgba(241, 184, 11, 0.14);
      }

      .traffic.error,
      .traffic.rejected {
        background: rgba(218, 56, 72, 0.12);
        color: #a61f2d;
      }

      .traffic.error::before,
      .traffic.rejected::before {
        background: var(--danger);
        box-shadow: 0 0 0 5px rgba(218, 56, 72, 0.14);
      }

      .status-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .status-button {
        height: 34px;
        padding: 0 12px;
        border-radius: 10px;
        background: #eff4fb;
        color: var(--brand-950);
      }

      .download-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 132px;
        padding: 9px 12px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 700;

      function simpleText(value) {
        return String(value ?? "").replace(/\r/g, " ").replace(/\n/g, " ").trim();

      function dedupeUsersByEmployeeId(list) {
        const lookup = new Map();
        list.forEach((user) => {
          if (!user || !user.employeeId) return;
          lookup.set(user.employeeId, user);
        });
        return [...lookup.values()];
      }

      function normalizeRoleValue(value) {
        const text = simpleText(value).toLowerCase();
        if (!text) return "hq";
        if (text.includes("영업") || text.includes("지점") || text === "branch") return "branch";
        if (text.includes("본사") || text === "hq") return "hq";
        if (text === "영업관리자") return "branch";
        if (text === "본사담당자") return "hq";
        if (text.includes("관리자")) return "hq";
        return "hq";
      }

      function normalizeLoginUserRecord(raw) {
        const employeeId = simpleText(raw.employeeId || raw["사번"] || raw["임직원번호"] || raw["직원번호"]);
        if (!/^\d{5}$/.test(employeeId)) return null;
        const role = normalizeRoleValue(raw.role || raw["권한"] || raw["역할"] || raw["구분"]);

        return {
          employeeId,
          name: simpleText(raw.name || raw["이름"] || raw["성명"] || raw["담당자명"]) || `${role === "hq" ? "본사담당자" : "영업관리자"} ${employeeId}`,

      }

      function statusFromKey(statusKey) {
        if (statusKey === "confirmed") return "확정";
        if (statusKey === "error" || statusKey === "rejected") return "오류";
        return "미확정";
      }

      function normalizeMonthValue(value) {
        if (!value && value !== 0) return "2026.06";
        const text = String(value).trim();
        const yearMonthMatch = text.match(/(20\d{2})\D{0,3}(\d{1,2})/);
        if (yearMonthMatch) {
          return `${yearMonthMatch[1]}.${yearMonthMatch[2].padStart(2, "0")}`;
        }

        const monthOnlyMatch = text.match(/(^|[^0-9])(\d{1,2})\s*월/);
        if (monthOnlyMatch) {
          return `2026.${monthOnlyMatch[2].padStart(2, "0")}`;
        }

        const compact = text.replace(/\s+/g, "");
        const decimalLikeMatch = compact.match(/^(20\d{2})\.(\d{1,2})$/);
        if (decimalLikeMatch) {
          return `${decimalLikeMatch[1]}.${decimalLikeMatch[2].padStart(2, "0")}`;
        }

        return "2026.06";
      }

        state.uploadMeta = state.monthMetaMap[month]

        state.uploadNoticeLines = Array.isArray(state.monthNoticeMap[month]) && state.monthNoticeMap[month].length

        state.uploadMode = state.monthUploadModeMap[month] || "template";

      function getNextPromotionId(items = state.promotions) {
        return items.reduce((maxId, item) => Math.max(maxId, Number(item.id) || 0), 0) + 1;
      }

      function mergeUploadedPromotionsByMonth(parsed, month, updatedAt) {
        const targetMonth = normalizeMonthValue(month);
        const preservedPromotions = state.promotions.filter((item) => item.month !== targetMonth);
        const preservedIdSet = new Set(preservedPromotions.map((item) => Number(item.id)));
        const nextTemplateForms = Object.fromEntries(
          Object.entries(state.templateForms || {}).filter(([itemId]) => preservedIdSet.has(Number(itemId)))
        );
        const nextPromotions = [...preservedPromotions];
        const idMap = new Map();
        let nextId = getNextPromotionId(preservedPromotions);

        parsed.promotions.forEach((item) => {
          const newId = nextId++;
          idMap.set(Number(item.id), newId);
          nextPromotions.push({
            ...item,
            id: newId,
            month: targetMonth,
            generated: false,
            updatedAt
          });
        });

        Object.entries(parsed.templateForms || {}).forEach(([itemId, templateData]) => {
          const mappedId = idMap.get(Number(itemId));
          if (mappedId) {
            nextTemplateForms[mappedId] = templateData;
          }
        });

        return {
          promotions: nextPromotions,
          templateForms: nextTemplateForms
        };
      }

      function getStatusClass(status) {
        if (status === "확정") return "confirmed";
        if (status === "오류") return "error";

      function formatFinalAppliedDate(value) {
        const normalized = normalizeCellText(value);
        const match = normalized.match(/(\d{4})-(\d{2})-(\d{2})/);
        if (!match) return "0000.00.00";
        return `${match[1]}.${match[2]}.${match[3]}`;
      }

        return `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;

      function syncTemplateFrame(frame, templateData) {
        if (!frame || !templateData) return;

        const payload = {
          type: "promo-template-data",
          data: templateData
        };

        const send = () => {
          try {
            if (frame.contentWindow) {
              frame.contentWindow.postMessage(payload, "*");
            }
          } catch (error) {
            console.error("템플릿 데이터 전송 실패", error);
          }
        };

        frame.addEventListener("load", send, { once: true });
        window.setTimeout(send, 120);
      }

      function normalizeCellText(value) {
        return String(value ?? "").replace(/\r/g, " ").replace(/\n/g, " ").trim();
      }

      function compactCellText(value) {
        return normalizeCellText(value).replace(/\s+/g, "");
      }

      function sheetToRows(sheet) {
        if (!sheet || !window.XLSX) return [];
        return window.XLSX.utils.sheet_to_json(sheet, {
          header: 1,
          raw: false,
          defval: ""
        });
      }

      function findColumnIndex(headers, candidates, fallbackIndex = 0) {
        const normalizedHeaders = headers.map(compactCellText);
        for (const candidate of candidates) {
          const target = compactCellText(candidate);
          const index = normalizedHeaders.findIndex((header) => header.includes(target));
          if (index >= 0) return index;
        }
        return fallbackIndex;
      }

      function findColumnIndexAcrossRows(rows, candidates, startIndex = 0, endIndex = 8, fallbackIndex = -1) {
        if (!Array.isArray(rows) || !rows.length) return fallbackIndex;
        for (let rowIndex = startIndex; rowIndex < Math.min(rows.length, endIndex); rowIndex += 1) {
          const row = (rows[rowIndex] || []).map(normalizeCellText);
          const fallback = row.length;
          const index = findColumnIndex(row, candidates, fallback);
          if (index >= 0 && index < row.length) {
            return index;
          }
        }
        return fallbackIndex;
      }

      function parseLoginUserWorkbook(fileName, workbook) {
        const firstSheetName = workbook?.SheetNames?.[0];
        if (!firstSheetName) {
          throw new Error("사번 목록 시트를 찾지 못했습니다.");
        }

        const rows = sheetToRows(workbook.Sheets[firstSheetName]).filter((row) => (
          Array.isArray(row) && row.some((cell) => normalizeCellText(cell))
        ));
        if (!rows.length) {
          throw new Error("사번 목록 데이터가 비어 있습니다.");
        }

        const headerRow = rows[0].map(normalizeCellText);
        const hasHeader = headerRow.some((cell) => ["사번", "이름", "성명", "조직", "부서", "소속", "권한", "역할", "구분"].includes(cell));
        const employeeIndex = findColumnIndex(headerRow, ["사번", "임직원번호", "직원번호"], 0);
        const nameIndex = findColumnIndex(headerRow, ["이름", "성명", "담당자명"], 1);
        const roleIndex = findColumnIndex(headerRow, ["권한", "역할", "구분"], 2);
        const orgIndex = findColumnIndex(headerRow, ["조직", "부서", "소속", "본부"], 3);

        const sourceRows = hasHeader ? rows.slice(1) : rows;
        const users = dedupeUsersByEmployeeId(sourceRows.map((row) => {
          const employeeId = normalizeCellText(row[employeeIndex]);
          if (!isFiveDigitNumber(employeeId)) return null;
          const role = normalizeRoleValue(row[roleIndex]);

          return {
            employeeId,
            name: normalizeCellText(row[nameIndex]) || `${role === "hq" ? "본사담당자" : "영업관리자"} ${employeeId}`,
            role,
            org: normalizeCellText(row[orgIndex]) || (role === "hq" ? "본사" : "지점")
          };
        }).filter(Boolean));

        if (!users.length) {
          throw new Error("사번 5자리 데이터를 찾지 못했습니다. 첫 번째 시트에 사번, 이름, 권한, 조직 열을 확인해주세요.");
        }

        return {
          fileName,
          users
        };
      }

      function buildPromotionKey(code, agency) {
        return `${normalizeCellText(code)}||${normalizeCellText(agency)}`;
      }

      function findSheetName(workbook, keyword) {
        if (!workbook) return "";
        const compactKeyword = compactCellText(keyword);
        return workbook.SheetNames.find((name) => compactCellText(name).includes(compactKeyword)) || "";
      }

      function normalizeUploadStatus(value, hasMetrics = false) {
        const normalized = compactCellText(value).toUpperCase();
        if (["○", "O", "확정"].includes(normalized)) return "확정";
        if (["X", "미확정"].includes(normalized)) return "미확정";
        if (normalized.includes("오류")) return "오류";
        return hasMetrics ? "확정" : "미확정";
      }

      function normalizeDivisionName(value) {
        return normalizeCellText(value).replace(/^GA/, "");
      }

      function normalizeBranchName(value) {
        return normalizeCellText(value)
          .replace(/^GA/, "")
          .replace(/(직할)?지점$/, "")
          .replace(/지사$/, "")
          .trim();
      }

      function normalizeBranchMatchKey(value) {
        return compactCellText(normalizeBranchName(value));
      }

      function normalizeDivisionName(value) {
        return normalizeCellText(value)
          .replace(/^GA\s*/i, "")
          .trim();
      }

      function normalizeBranchName(value) {
        return normalizeCellText(value)
          .replace(/^GA\s*/i, "")
          .replace(/\s+/g, "")
          .replace(/직할지점$/u, "")
          .replace(/직할지사$/u, "")
          .replace(/지점$/u, "")
          .replace(/지사$/u, "")
          .trim();
      }

      function findSimpleDataHeaderInfo(rows) {
        const defaultInfo = {
          headerIndex: 3,
          statusIndex: 0,
          codeIndex: 1,
          agencyIndex: 2,
          branchIndex: -1,
          dataStartIndex: 6
        };

        if (!Array.isArray(rows) || !rows.length) {
          return defaultInfo;
        }

        const headerIndex = rows.findIndex((row) => {
          const cells = (row || []).map(compactCellText);
          return cells.some((cell) => cell.includes("코드"))
            && cells.some((cell) => cell.includes("GA명") || cell.includes("GA지사"));
        });

        if (headerIndex < 0) {
          return defaultInfo;
        }

        const headerRow = (rows[headerIndex] || []).map(normalizeCellText);
        const statusIndex = findColumnIndex(headerRow, ["최종확정여부", "확정여부", "상태"], 0);
        const codeIndex = findColumnIndex(headerRow, ["코드", "등록코드"], 1);
        const agencyIndex = findColumnIndex(headerRow, ["GA지사", "GA명", "대리점명", "조직명"], 2);
        const branchIndex = (() => {
          const fallback = headerRow.length;
          const index = findColumnIndex(headerRow, ["관리지점", "관리지점명", "관리지사", "담당지점", "지점", "담당지사", "지사"], fallback);
          return index >= headerRow.length ? -1 : index;
        })();

        let dataStartIndex = headerIndex + 1;
        while (dataStartIndex < rows.length) {
          const row = rows[dataStartIndex] || [];
          const code = normalizeCellText(row[codeIndex]);
          const agency = normalizeCellText(row[agencyIndex]);
          const status = normalizeCellText(row[statusIndex]);
          const hasAnyCell = row.some((cell) => normalizeCellText(cell));
          const isHeaderLike = ["코드", "GA명", "GA지사", "최종확정여부", "확정여부", "상태"].includes(code)
            || ["코드", "GA명", "GA지사", "최종확정여부", "확정여부", "상태"].includes(agency)
            || ["코드", "GA명", "GA지사", "최종확정여부", "확정여부", "상태"].includes(status);

          if (!hasAnyCell || isHeaderLike) {
            dataStartIndex += 1;
            continue;
          }

          if (code || agency) {
            break;
          }

          dataStartIndex += 1;
        }

        return {
          headerIndex,
          statusIndex,
          codeIndex,
          agencyIndex,
          branchIndex,
          dataStartIndex
        };
      }

      function buildTableLookup(rows, dataStartIndex) {
        const lookup = new Map();
        rows.slice(dataStartIndex).forEach((row) => {
          const code = normalizeCellText(row[0]);
          const agency = normalizeCellText(row[1]);
          if (!code || !agency) return;
          lookup.set(buildPromotionKey(code, agency), row);
        });
        return lookup;
      }

      function buildOrgLookup(rows) {
        const byCode = new Map();
        const byAgency = new Map();
        const byBranch = new Map();
        if (!Array.isArray(rows) || !rows.length) {
          return { byCode, byAgency, byBranch };
        }

        const headerRow = (rows[0] || []).map(normalizeCellText);
        const hasHeader = headerRow.some((cell) => [
          "대리점등록번호", "등록번호", "등록코드", "코드", "지점코드", "지역단", "지점", "지점조직명", "GA명", "GA", "대리점명", "조직명"
        ].includes(compactCellText(cell)));

        const codeIndex = hasHeader ? findColumnIndex(headerRow, ["대리점등록번호", "등록번호", "등록코드", "코드", "지점코드", "조직코드", "본점코드"], 12) : 12;
        const divisionIndex = hasHeader ? findColumnIndex(headerRow, ["지역단조직명", "지역단", "지역", "지역단명", "division"], 3) : 3;
        const branchIndex = hasHeader ? findColumnIndex(headerRow, ["지점조직명", "지점명", "지점", "지사", "branch"], 4) : 4;
        const agencyIndex = hasHeader ? findColumnIndex(headerRow, ["조직명", "GA명", "GA", "대리점명"], 6) : 6;

        const sourceRows = hasHeader ? rows.slice(1) : rows;
        sourceRows.forEach((row) => {
          const registrationCode = normalizeCellText(row[codeIndex]);
          const agencyName = normalizeCellText(row[agencyIndex]);
          const info = {
            divisionName: normalizeDivisionName(row[divisionIndex]),
            branchName: normalizeBranchName(row[branchIndex]),
            organizationName: agencyName
          };

          if (registrationCode && !byCode.has(registrationCode)) {
            byCode.set(registrationCode, info);
          }

          const agencyKey = normalizeAgencyMatchKey(agencyName);
          if (agencyKey && !byAgency.has(agencyKey)) {
            byAgency.set(agencyKey, info);
          }

          const branchKey = normalizeBranchMatchKey(info.branchName);
          if (branchKey && !byBranch.has(branchKey)) {
            byBranch.set(branchKey, info);
          }
        });

        return { byCode, byAgency, byBranch };
      }

      function createDefaultUploadMeta() {
        return {
          month: "2026.06",
          targetProducts: "행복종신/플러스원/암치료비플러스/순수3종",
          period: "6/1 ~ 6/28",
          generatedTitle: "26.6월 프로모션"
        };
      }

      function createDefaultUploadBlocks() {
        return [
          "정규시상",
          "기본가동프로모션",
          "5~6월 브릿지",
          "6~7월 브릿지",
          "Gold 시상"
        ];
      }

      function createDefaultNoticeLines() {
        return [
          "세부 지급기준 및 적용조건은 본사 최종 공지 기준으로 운영됩니다.",
          "프로모션별 중복 적용 여부는 항목별 기준을 확인해 주세요.",
          "최종 확정 전 안내장은 변경될 수 있습니다."
        ];
      }

      function toPromotionTitle(monthValue) {
        const normalized = normalizeMonthValue(monthValue);
        const match = normalized.match(/(\d{4})\.(\d{2})/);
        if (!match) return `${normalized} 프로모션`;
        return `${match[1].slice(2)}.${String(Number(match[2]))}월 프로모션`;
      }

      function normalizeLegacyBlockTitle(value, fallback = "") {
        const text = normalizeCellText(value || fallback)
          .replace(/_/g, " ")
          .replace(/^[0-9]+\s*[\.\-_)]+\s*/u, "")
          .replace(/^[①②③④⑤⑥⑦⑧⑨⑩]\s*/u, "")
          .replace(/\s+/g, " ")
          .trim();
        return text || normalizeCellText(fallback);
      }

      function getBlockDisplay(blocks, index, fallbackTitle = "", fallbackRound = "[13??") {
        const rawText = normalizeLegacyBlockTitle((blocks || [])[index], fallbackTitle);
        if (!rawText) {
          return { title: "", round: "" };
        }

        const roundMatch = rawText.match(/(\[[^\]]+\])/u);
        return {
          title: rawText.replace(/\[[^\]]+\]/gu, "").trim(),
          round: roundMatch ? roundMatch[1].trim() : fallbackRound
        };
      }

      function clearTemplateSection(data, sectionNumber) {
        const fields = [
          `section${sectionNumber}Title`,
          `section${sectionNumber}Round`,
          `section${sectionNumber}Max`,
          `section${sectionNumber}Headers`,
          `section${sectionNumber}Rows`,
          `section${sectionNumber}Note`
        ];
        fields.forEach((field) => {
          if (field in data) {
            data[field] = "";
          }
        });
      }

      function applyTemplateBlockLayout(data, blocks, fallbacks = []) {
        [1, 2, 3, 4].forEach((sectionNumber) => {
          const fallback = fallbacks[sectionNumber - 1] || {};
          const block = getBlockDisplay(blocks, sectionNumber, fallback.title || "", fallback.round || "[13??");
          if (!block.title) {
            clearTemplateSection(data, sectionNumber);
            return;
          }

          data[`section${sectionNumber}Title`] = block.title;
          if (`section${sectionNumber}Round` in data) {
            data[`section${sectionNumber}Round`] = block.round;
          }
        });
      }

      function isExplicitMonthSource(value) {
        const text = String(value ?? "").trim();
        if (!text) return false;
        return /(20\d{2})\D{0,3}(\d{1,2})/.test(text) || /(^|[^0-9])(\d{1,2})\s*월/.test(text);
      }

      function findMonthValueInRows(rows) {
        if (!Array.isArray(rows)) return "";
        for (const row of rows.slice(0, 20)) {
          for (const cell of (row || []).slice(0, 8)) {
            if (isExplicitMonthSource(cell)) {
              return normalizeMonthValue(cell);
            }
          }
        }
        return "";
      }

      function extractMonthValueFromWorkbook(workbook, fileName = "") {
        if (isExplicitMonthSource(fileName)) {
          return normalizeMonthValue(fileName);
        }

        for (const name of workbook?.SheetNames || []) {
          if (isExplicitMonthSource(name)) {
            return normalizeMonthValue(name);
          }
        }

        for (const name of workbook?.SheetNames || []) {
          const rows = sheetToRows(workbook.Sheets[name]);
          const month = findMonthValueInRows(rows);
          if (month) return month;
        }

        return "";
      }

      function buildTargetProductsFromRows(rows, indexes = [5, 6]) {
        const products = [];
        rows.forEach((row) => {
          indexes.forEach((index) => {
            const value = normalizeCellText(row[index]);
            if (value && !products.includes(value)) {
              products.push(value);
            }
          });
        });
        return products.slice(0, 5).join("/") || createDefaultUploadMeta().targetProducts;
      }

      function parseNoticeSheetRows(rows) {
        const notices = [];
        rows.forEach((row) => {
          const firstCell = normalizeCellText((row || [])[0] || "");
          const secondCell = normalizeCellText((row || [])[1] || "");
          if (!firstCell && !secondCell) return;

          if (compactCellText(firstCell).startsWith("유의사항")) {
            if (secondCell) notices.push(secondCell);
            return;
          }

          if (secondCell && ["문구", "설명"].includes(firstCell)) return;
          if (firstCell && !secondCell && firstCell.length > 5) {
            notices.push(firstCell);
          }
        });
        return notices.filter(Boolean).slice(0, 3);
      }

      function extractNoticeLines(workbook) {
        const noticeSheetName = findSheetName(workbook, "유의사항입력")
          || findSheetName(workbook, "유의사항")
          || workbook.SheetNames[2]
          || "";
        if (!noticeSheetName) return createDefaultNoticeLines();
        const rows = sheetToRows(workbook.Sheets[noticeSheetName]);
        const notices = parseNoticeSheetRows(rows);
        return notices.length ? notices : createDefaultNoticeLines();
      }

      function parseSimpleMetaAndBlocks(rows) {
        const meta = createDefaultUploadMeta();
        const blocks = [];

        rows.forEach((row) => {
          const key = normalizeCellText((row || [])[0] || "");
          const value = normalizeCellText((row || [])[1] || "");
          if (!key || !value) return;

          if (key === "기준월") meta.month = normalizeMonthValue(value);
          if (key === "대상상품") meta.targetProducts = value;
          if (key === "시상기간") meta.period = value;
          if (compactCellText(key).startsWith("블록")) blocks.push(value);
        });

        meta.generatedTitle = toPromotionTitle(meta.month);
        return {
          meta,
          blocks: blocks.filter(Boolean)
        };
      }

      function normalizeAgencyMatchKey(value) {
        return normalizeCellText(value)
          .replace(/\(주\)|주식회사|㈜/g, "")
          .replace(/\([^)]*\)/g, "")
          .replace(/\s+/g, "")
          .toLowerCase();
      }

      function findAgencySeedInfo(agency) {
        const targetKey = normalizeAgencyMatchKey(agency);
        if (!targetKey) return null;

        const pool = [...state.promotions, ...seedPromotions];
        return pool.find((item) => {
          const itemKey = normalizeAgencyMatchKey(item.agency);
          return itemKey && (itemKey === targetKey || itemKey.includes(targetKey) || targetKey.includes(itemKey));
        }) || null;
      }

      function findOrgInfo(orgLookup, code, agency) {
        if (!orgLookup) return null;

        const codeKey = normalizeCellText(code);
        if (codeKey && orgLookup.byCode instanceof Map && orgLookup.byCode.has(codeKey)) {
          return orgLookup.byCode.get(codeKey);
        }

        const agencyKey = normalizeAgencyMatchKey(agency);
        if (agencyKey && orgLookup.byAgency instanceof Map) {
          if (orgLookup.byAgency.has(agencyKey)) {
            return orgLookup.byAgency.get(agencyKey);
          }

          for (const [storedKey, info] of orgLookup.byAgency.entries()) {
            if (storedKey.includes(agencyKey) || agencyKey.includes(storedKey)) {
              return info;
            }
          }
        }

        return null;
      }

      function findOrgInfoByBranch(orgLookup, branch) {
        if (!orgLookup || !(orgLookup.byBranch instanceof Map)) return null;
        const branchKey = normalizeBranchMatchKey(branch);
        if (!branchKey) return null;

        if (orgLookup.byBranch.has(branchKey)) {
          return orgLookup.byBranch.get(branchKey);
        }

        for (const [storedKey, info] of orgLookup.byBranch.entries()) {
          if (storedKey.includes(branchKey) || branchKey.includes(storedKey)) {
            return info;
          }
        }

        return null;
      }

      function isSimpleInputWorkbook(workbook) {
        const secondSheetName = workbook?.SheetNames?.[1];
        if (!secondSheetName) return false;
        const rows = sheetToRows(workbook.Sheets[secondSheetName]);
        const keys = rows.slice(0, 12).map((row) => normalizeCellText((row || [])[0] || ""));
        return keys.includes("기준월") && keys.some((key) => compactCellText(key).startsWith("블록"));

      function buildTemplateDataFromSimpleConfig(item, meta, blocks, noticeLines, rows = []) {
        const createInitialFormData = window.PromoTemplateData?.createInitialFormData;
        if (!createInitialFormData) return null;
        const applySheetRowsToData = window.PromoTemplateData?.applySheetRowsToData;

        const data = createInitialFormData();
        data.promoDate = `${meta.month}월`;

        data.section2Title = blocks[2] || "5~6월 브릿지";
        data.section3Title = blocks[3] || "6~7월 브릿지";
        data.section4Title = blocks[4] || "Gold 시상";

        const detailedData = applySheetRowsToData ? applySheetRowsToData(data, rows) : data;
        detailedData.footerBanner = noticeLines.join(" / ");
        return detailedData;
      }

      function buildSimpleWorkbookDataset(workbook, meta, blocks, noticeLines, rows) {
        const dataSheetName = findSheetName(workbook, "데이터");
        const orgSheetName = findSheetName(workbook, "조직") || findSheetName(workbook, "GA지사현황");
        const orgLookup = orgSheetName ? buildOrgLookup(sheetToRows(workbook.Sheets[orgSheetName])) : null;
        if (!dataSheetName) {
          const sampleItem = {
            id: 1,
            code: "SAMPLE",
            agency: "업로드 샘플",
            region: "표준안내장",
            branch: "입력기준",
            rm: "본사담당자",
            product: meta.targetProducts || "프로모션",
            happyType: "",
            month: meta.month,
            status: "확정",
            errorReason: "",
            generated: false,
            updatedAt: getNowStamp(),

          };

          return {
            promotions: [sampleItem],
            templateForms: {
              1: buildTemplateDataFromSimpleConfig(sampleItem, meta, blocks, noticeLines, rows)
            }
          };
        }

        const rawDataRows = sheetToRows(workbook.Sheets[dataSheetName]);
        const dataHeaderInfo = findSimpleDataHeaderInfo(rawDataRows);
        const dataRows = rawDataRows
          .slice(dataHeaderInfo.dataStartIndex)
          .filter((row) => (
            normalizeCellText((row || [])[dataHeaderInfo.codeIndex] || "")
            || normalizeCellText((row || [])[dataHeaderInfo.agencyIndex] || "")
          ));

        const promotions = [];
        const templateForms = {};

        dataRows.forEach((row) => {
          const code = normalizeCellText(row[dataHeaderInfo.codeIndex]) || `SIMPLE-${promotions.length + 1}`;
          const agency = normalizeCellText(row[dataHeaderInfo.agencyIndex]);
          if (!agency) return;

          const matched = findAgencySeedInfo(agency);
          const branchFromData = dataHeaderInfo.branchIndex >= 0
            ? normalizeBranchName(row[dataHeaderInfo.branchIndex])
            : "";
          const orgInfo = findOrgInfo(orgLookup, code, agency);
          const branchName = branchFromData || orgInfo?.branchName || normalizeBranchName(matched?.branch || "") || "전체대리점";
          const branchMatchedOrg = findOrgInfoByBranch(orgLookup, branchName);
          const resolvedRegion = branchMatchedOrg?.divisionName || orgInfo?.divisionName || matched?.region || "업로드대상";
          const resolvedBranch = branchMatchedOrg?.branchName || orgInfo?.branchName || branchName;
          const hasMetrics = row.some((cell, index) => (
            ![dataHeaderInfo.statusIndex, dataHeaderInfo.codeIndex, dataHeaderInfo.agencyIndex].includes(index)
            && normalizeCellText(cell)
          ));
          const status = normalizeUploadStatus(row[dataHeaderInfo.statusIndex], hasMetrics);
          const itemId = promotions.length + 1;
          const item = {
            id: itemId,
            code,
            agency: agency || orgInfo?.organizationName || branchMatchedOrg?.organizationName || "업로드대상",
            region: resolvedRegion,
            branch: resolvedBranch,
            rm: matched?.rm || "본사담당자",
            product: meta.targetProducts || matched?.product || "프로모션",
            happyType: "",
            month: meta.month,
            status,
            errorReason: status === "미확정"
              ? "프로모션 수치 데이터 미입력"
              : (status === "오류" ? "업로드 데이터 확인 필요" : ""),
            generated: false,
            updatedAt: getNowStamp(),
            noticeFile: `${agency}_안내장.jpg`
          };

          promotions.push(item);

          if (status === "확정") {
            templateForms[itemId] = buildTemplateDataFromSimpleConfig(item, meta, blocks, noticeLines, rows);
          }
        });

        return {
          promotions,
          templateForms
        };
      }

      function parseSimplePromotionWorkbook(fileName, workbook) {
        const secondSheetName = workbook?.SheetNames?.[1];
        if (!secondSheetName) {
          throw new Error("두번째 시트를 찾지 못했습니다.");
        }

        const rows = sheetToRows(workbook.Sheets[secondSheetName]);
        const { meta, blocks } = parseSimpleMetaAndBlocks(rows);
        const detectedMonth = extractMonthValueFromWorkbook(workbook, fileName);
        if (detectedMonth) {
          meta.month = detectedMonth;
          meta.generatedTitle = toPromotionTitle(detectedMonth);
        }
        const noticeLines = extractNoticeLines(workbook);
        const dataset = buildSimpleWorkbookDataset(workbook, meta, blocks, noticeLines, rows);

        return {
          promotions: dataset.promotions,
          templateForms: dataset.templateForms,
          monthValue: meta.month,
          fileName,
          uploadMeta: meta,
          uploadBlocks: blocks.length ? blocks : createDefaultUploadBlocks(),
          uploadNoticeLines: noticeLines,
          uploadMode: "simple"
        };
      }

          { title: "6~7월 브릿지", round: "[13회]" },
          { title: "", round: "" }
        ]);

        if (data.section1Title && basicRow) {
          data.section1Max = normalizeCellText(basicRow[5] || basicRow[2]);
          data.section1Headers = ["실적", ...basicHeaders].join(",");
          data.section1Rows = [
            ["1~13일", ...basicRow.slice(6, 12).map(normalizeCellText)].join("|"),
            ["14~28일", ...basicRow.slice(12, 18).map(normalizeCellText)].join("|")
          ].join("\n");
        } else {
          clearTemplateSection(data, 1);
        }

        if (data.section2Title && bridge56Row) {
          data.section2Max = normalizeCellText(bridge56Row[2]);
          data.section2Headers = ["실적", ...bridge56Headers].join(",");
          data.section2Rows = [
            [...bridge56Row.slice(3, 9).map(normalizeCellText)].join("|"),
            [...bridge56Row.slice(9, 15).map(normalizeCellText)].join("|")
          ].filter((row) => row.replace(/\|/g, "").trim()).join("\n");
          data.section2Note = noticeLines[0] || "업로드 기준 수치 자동 반영";
        } else {
          clearTemplateSection(data, 2);
        }

        if (data.section3Title && bridge67Row) {
          data.section3Headers = ["실적", ...bridge67Headers].join(",");
          data.section3Rows = [
            [...bridge67Row.slice(3, 9).map(normalizeCellText)].join("|"),
            [...bridge67Row.slice(9, 15).map(normalizeCellText)].join("|")
          ].filter((row) => row.replace(/\|/g, "").trim()).join("\n");
        } else {
          clearTemplateSection(data, 3);
        }

        clearTemplateSection(data, 4);
        data.footerBanner = noticeLines.join(" / ") || `${item.rm} / ${item.product}`;
        return data;
      }

      function parsePromotionWorkbook(fileName, workbook) {
        if (isSimpleInputWorkbook(workbook)) {
          return parseSimplePromotionWorkbook(fileName, workbook);
        }

        const mainSheetName = findSheetName(workbook, "지점별담당분류_전체");
        const basicSheetName = findSheetName(workbook, "기본가동");
        const bridge56SheetName = findSheetName(workbook, "5~6브릿지");
        const bridge67SheetName = findSheetName(workbook, "6~7브릿지");
        const orgSheetName = findSheetName(workbook, "조직");
        if (!mainSheetName || !orgSheetName) {
          throw new Error("필수 시트를 찾지 못했습니다. 지점별 담당분류_전체와 조직 시트를 확인해주세요.");
        }

        const monthValue = getMonthDisplayFromWorkbook(workbook);
        const mainRows = sheetToRows(workbook.Sheets[mainSheetName]);
        const basicRows = basicSheetName ? sheetToRows(workbook.Sheets[basicSheetName]) : [];
        const bridge56Rows = bridge56SheetName ? sheetToRows(workbook.Sheets[bridge56SheetName]) : [];
        const bridge67Rows = bridge67SheetName ? sheetToRows(workbook.Sheets[bridge67SheetName]) : [];
        const orgRows = sheetToRows(workbook.Sheets[orgSheetName]);
        const headerRows = {
          basic: basicRows[4] || [],
          bridge56: bridge56Rows[4] || [],
          bridge67: bridge67Rows[4] || []
        };

        const basicLookup = basicSheetName ? buildTableLookup(basicRows, 6) : new Map();
        const bridge56Lookup = bridge56SheetName ? buildTableLookup(bridge56Rows, 6) : new Map();
        const bridge67Lookup = bridge67SheetName ? buildTableLookup(bridge67Rows, 6) : new Map();
        const orgLookup = buildOrgLookup(orgRows);
        const uploadMeta = extractUploadMetaFromLegacyWorkbook(workbook, monthValue, mainRows);
        const uploadBlocks = extractUploadBlocksFromLegacyWorkbook(workbook, mainRows);
        const uploadNoticeLines = extractNoticeLines(workbook);
        const promotions = [];
        const templateForms = {};
        const dataRows = mainRows.slice(7).filter((row) => normalizeCellText(row[2]) || normalizeCellText(row[4]));
        const mainHeaderRows = mainRows.slice(0, 7);
        const legacyBranchIndex = (() => {
          const headerRow = mainHeaderRows.find((row) => Array.isArray(row) && row.some((cell) => {
            const text = compactCellText(cell);
            return text.includes("관리지점") || text.includes("담당지점") || text === "지점";
          })) || [];
          if (!headerRow.length) return 24;
          const fallback = headerRow.length;
          const index = findColumnIndex(headerRow.map(normalizeCellText), ["관리지점", "관리지점명", "담당지점", "지점"], fallback);
          return index >= headerRow.length ? 24 : index;
        })();

        dataRows.forEach((row, index) => {
          const code = normalizeCellText(row[2]);
          const agency = normalizeCellText(row[4]);
          if (!code || !agency) return;
          const key = buildPromotionKey(code, agency);
          const orgInfo = orgLookup.byCode instanceof Map ? orgLookup.byCode.get(code) : null;
          const basicRow = basicLookup.get(key);
          const bridge56Row = bridge56Lookup.get(key);
          const bridge67Row = bridge67Lookup.get(key);
          const finalConfirm = normalizeCellText(row[7]);
          const fallbackBranch = normalizeBranchName(row[legacyBranchIndex] || row[24]);
          const branchSeed = orgInfo?.branchName || fallbackBranch || "미지정";
          const branchMatchedOrg = orgInfo?.divisionName ? orgInfo : findOrgInfoByBranch(orgLookup, branchSeed);
          const region = branchMatchedOrg?.divisionName || orgInfo?.divisionName || "미지정";
          const branch = branchMatchedOrg?.branchName || branchSeed;
          const requiredRows = [
            { enabled: Boolean(getBlockDisplay(uploadBlocks, 1, basicSheetName ? "기본가동프로모션" : "", "").title), row: basicRow },
            { enabled: Boolean(getBlockDisplay(uploadBlocks, 2, bridge56SheetName ? "5~6월 브릿지" : "", "").title), row: bridge56Row },
            { enabled: Boolean(getBlockDisplay(uploadBlocks, 3, bridge67SheetName ? "6~7월 브릿지" : "", "").title), row: bridge67Row }
          ];

          let status = "확정";
          let errorReason = "";
          let templateData = null;
          if (!branch || branch === "미지정") {
            status = "오류";
            errorReason = "조직 매핑 없음";
          } else if (requiredRows.some((entry) => entry.enabled && !entry.row)) {
            status = "미확정";
          } else if (finalConfirm !== "O") {
            status = "미확정";
          } else {
            templateData = buildTemplateDataFromRows({
              agency,
              region,
              branch,
              product: normalizeCellText(row[5]) || "프로모션",
              happyType: normalizeCellText(row[6]),
              rm: normalizeCellText(row[25]) || "미배정",
              month: monthValue,
              status
            }, basicRow, bridge56Row, bridge67Row, headerRows, uploadMeta, uploadNoticeLines, uploadBlocks);
          }

          const itemId = index + 1;
          promotions.push({
            id: itemId,
            code,
            agency,
            region,
            branch,
            rm: normalizeCellText(row[25]) || "미배정",
            product: normalizeCellText(row[5]) || "프로모션",
            happyType: normalizeCellText(row[6]),
            month: monthValue,
            status,
            errorReason,
            generated: false,
            updatedAt: getNowStamp(),
            noticeFile: `${agency}_안내장.png`
          });

          if (templateData) {
            templateForms[itemId] = templateData;
          }
        });

        return {
          promotions,
          templateForms,
          monthValue,
          fileName,
          uploadMeta,
          uploadBlocks,
          uploadNoticeLines,
          uploadMode: "legacy"
        };
      }

        return getAllLoginUsers().find((user) => user.employeeId === employeeId) || null;

      function isFiveDigitNumber(value) {
        return /^\d{5}$/.test(value);
      }

      function isBranchMatch(item, org) {
        return [item.branch, item.region, item.agency, item.rm]
          .filter(Boolean)
          .some((value) => String(value).includes(org));
      }

      function getUserScopedPromotions() {
        if (!state.currentUser) return [];
        if (state.currentUser.role === "hq" || state.showAllAgencies) {
          return state.promotions;
        }

        const scoped = state.promotions.filter((item) => isBranchMatch(item, state.currentUser.org));
        return scoped.length ? scoped : state.promotions;
      }

      function getMonthScopedPromotions() {
        return getUserScopedPromotions().filter((item) => item.month === state.selectedMonth);
      }

      function getRegionOptions(data) {
        return [...new Set(data.map((item) => item.region).filter(Boolean))].sort((a, b) => a.localeCompare(b, "ko"));
      }

      function getBranchOptions(data) {
        return [...new Set(data.map((item) => item.branch).filter(Boolean))].sort((a, b) => a.localeCompare(b, "ko"));
      }

      function getStatusSortValue(status) {
        if (status === "확정") return 3;
        if (status === "미확정") return 2;
        return 1;
      }

      function sortPromotions(data) {
        const sorted = [...data];
        const direction = state.sortDirection === "desc" ? -1 : 1;

        sorted.sort((a, b) => {
          let compare = 0;

          if (state.sortField === "region") {
            compare = a.region.localeCompare(b.region, "ko");
          } else if (state.sortField === "branch") {
            compare = a.branch.localeCompare(b.branch, "ko");
          } else if (state.sortField === "agency") {
            compare = a.agency.localeCompare(b.agency, "ko");
          } else if (state.sortField === "status") {
            compare = getStatusSortValue(a.status) - getStatusSortValue(b.status);
          } else if (state.sortField === "updatedAt") {
            compare = a.updatedAt.localeCompare(b.updatedAt);
          }

          if (compare === 0) {
            compare = a.agency.localeCompare(b.agency, "ko");
          }

          return compare * direction;
        });

        return sorted;
      }

      function applyFilters(data) {
        let filtered = [...data];

        if (state.regionFilter !== "all") {
          filtered = filtered.filter((item) => item.region === state.regionFilter);
        }

        if (state.branchFilter !== "all") {
          filtered = filtered.filter((item) => item.branch === state.branchFilter);
        }

        if (state.statusFilter !== "all") {
          filtered = filtered.filter((item) => item.status === state.statusFilter);
        }

        if (state.agencyQuery) {
          const keyword = state.agencyQuery.toLowerCase();
          filtered = filtered.filter((item) => item.agency.toLowerCase().includes(keyword));
        }

        return filtered;
      }

        const templateData = state.templateForms[item.id];
        if (!templateData) {
          throw new Error("표준안내장 데이터가 없어 다운로드할 수 없습니다.");

        const storageKey = `promo-template-download-${item.id}-${Date.now()}`;
        window.localStorage.setItem(storageKey, JSON.stringify(templateData));

        const downloadUrl = `./template-package/promo-template.html?preview=1&readonly=1&autodownload=1&storageKey=${encodeURIComponent(storageKey)}&fileName=${encodeURIComponent(`${item.agency}_안내장.jpg`)}`;

      async function handleDownloadClick(button) {
        const isEnabled = button.dataset.downloadEnabled === "true";
        const status = button.dataset.downloadStatus || "";
        const targetId = Number(button.dataset.downloadId);

        if (!isEnabled) {
          if (status === "미확정") {
            window.alert("미확정 건은 다운로드할 수 없습니다.");
          } else if (status === "오류") {
            window.alert("오류 건은 다운로드할 수 없습니다. 오류 사유를 먼저 확인해주세요.");
          } else {
            window.alert("표준안내장 생성과 전체 승인 후 다운로드할 수 있습니다.");
          }
          return false;
        }

        const item = state.promotions.find((promotion) => promotion.id === targetId);
        if (!item) {
          window.alert("다운로드 대상을 찾지 못했습니다.");
          return false;
        }

        try {
          await downloadNoticeAsJpg(item);
        } catch (error) {
          console.error(error);
          window.alert(`다운로드에 실패했습니다.\n${error.message}`);
        }

        return false;
      }

          } catch (error) {
            console.warn("기존 업로드 URL 해제 실패", error);

        state[nameKey] = file.name;

        return true;
      }

      function rememberMonthlyUploadFile(file, monthValue) {

      function findSimpleDataHeaderInfo(rows) {
        const defaultInfo = {
          headerIndex: 3,
          statusIndex: 0,
          codeIndex: 1,
          agencyIndex: 2,
          branchIndex: -1,
          dataStartIndex: 6
        };

        if (!Array.isArray(rows) || !rows.length) {
          return defaultInfo;
        }

        const statusCandidates = ["\uCD5C\uC885\uD655\uC815\uC5EC\uBD80", "\uD655\uC815\uC5EC\uBD80", "\uC0C1\uD0DC"];
        const codeCandidates = ["\uCF54\uB4DC", "\uB4F1\uB85D\uCF54\uB4DC"];
        const agencyCandidates = ["GA\uC9C0\uC0AC", "GA\uBA85", "\uB300\uB9AC\uC810\uBA85", "\uC870\uC9C1\uBA85"];
        const branchCandidates = ["\uAD00\uB9AC\uC9C0\uC810", "\uAD00\uB9AC\uC9C0\uC810\uBA85", "\uAD00\uB9AC\uC9C0\uC0AC", "\uB2F4\uB2F9\uC9C0\uC810", "\uC9C0\uC810", "\uB2F4\uB2F9\uC9C0\uC0AC", "\uC9C0\uC0AC"];
        const headerKeywords = [...statusCandidates, ...codeCandidates, ...agencyCandidates];

        const headerIndex = rows.findIndex((row) => {
          const cells = (row || []).map(compactCellText);
          return cells.some((cell) => codeCandidates.some((candidate) => cell.includes(compactCellText(candidate))))
            && cells.some((cell) => agencyCandidates.some((candidate) => cell.includes(compactCellText(candidate))));
        });

        if (headerIndex < 0) {
          return defaultInfo;
        }

        const headerRow = (rows[headerIndex] || []).map(normalizeCellText);
        const statusIndex = findColumnIndex(headerRow, statusCandidates, 0);
        const codeIndex = findColumnIndex(headerRow, codeCandidates, 1);
        const agencyIndex = findColumnIndex(headerRow, agencyCandidates, 2);
        const branchIndex = (() => {
          const sameRowIndex = findColumnIndex(headerRow, branchCandidates, headerRow.length);
          if (sameRowIndex >= 0 && sameRowIndex < headerRow.length) {
            return sameRowIndex;
          }
          return findColumnIndexAcrossRows(rows, branchCandidates, Math.max(0, headerIndex - 1), headerIndex + 3, -1);
        })();

        let dataStartIndex = headerIndex + 1;
        while (dataStartIndex < rows.length) {
          const row = rows[dataStartIndex] || [];
          const code = normalizeCellText(row[codeIndex]);
          const agency = normalizeCellText(row[agencyIndex]);
          const status = normalizeCellText(row[statusIndex]);
          const hasAnyCell = row.some((cell) => normalizeCellText(cell));
          const isHeaderLike = headerKeywords.includes(code) || headerKeywords.includes(agency) || headerKeywords.includes(status);

          if (!hasAnyCell || isHeaderLike) {
            dataStartIndex += 1;
            continue;
          }

          if (code || agency) {
            break;
          }

          dataStartIndex += 1;
        }

        return {
          headerIndex,
          statusIndex,
          codeIndex,
          agencyIndex,
          branchIndex,
          dataStartIndex
        };
      }

      function resolveOrgMapping(orgLookup, code, agency, branchSeed) {
        const orgInfo = findOrgInfo(orgLookup, code, agency);
        const normalizedBranchSeed = normalizeBranchName(branchSeed);
        const branchInfo = normalizedBranchSeed ? findOrgInfoByBranch(orgLookup, normalizedBranchSeed) : null;

        return {
          orgInfo,
          branchInfo,
          region: branchInfo?.divisionName || orgInfo?.divisionName || "",
          branch: branchInfo?.branchName || orgInfo?.branchName || normalizedBranchSeed || "",
          agency: agency || orgInfo?.organizationName || branchInfo?.organizationName || ""
        };
      }

      function buildSimpleWorkbookDataset(workbook, meta, blocks, noticeLines, rows) {
        const dataSheetName = findSheetName(workbook, "\uB370\uC774\uD130");
        const orgSheetName = findSheetName(workbook, "\uC870\uC9C1") || findSheetName(workbook, "GA\uC9C0\uC0AC\uD604\uD669");
        const orgLookup = orgSheetName ? buildOrgLookup(sheetToRows(workbook.Sheets[orgSheetName])) : null;

        if (!dataSheetName) {
          const sampleItem = {
            id: 1,
            code: "SAMPLE",
            agency: "\uC5C5\uB85C\uB4DC\uC0D8\uD50C",
            region: "\uC548\uB0B4\uD15C\uD50C",
            branch: "\uC785\uB825\uAE30\uC900",
            rm: "\uBCF8\uC0AC\uB2F4\uB2F9\uC790",
            product: meta.targetProducts || "\uD504\uB85C\uBAA8\uC158",
            happyType: "",
            month: meta.month,
            status: "\uD655\uC815",
            errorReason: "",
            generated: false,
            updatedAt: getNowStamp(),
            noticeFile: "upload_sample_notice.jpg"
          };

          return {
            promotions: [sampleItem],
            templateForms: {
              1: buildTemplateDataFromSimpleConfig(sampleItem, meta, blocks, noticeLines, rows)
            }
          };
        }

        const rawDataRows = sheetToRows(workbook.Sheets[dataSheetName]);
        const dataHeaderInfo = findSimpleDataHeaderInfo(rawDataRows);
        const dataRows = rawDataRows
          .slice(dataHeaderInfo.dataStartIndex)
          .filter((row) => (
            normalizeCellText((row || [])[dataHeaderInfo.codeIndex] || "")
            || normalizeCellText((row || [])[dataHeaderInfo.agencyIndex] || "")
          ));

        const promotions = [];
        const templateForms = {};

        dataRows.forEach((row) => {
          const code = normalizeCellText(row[dataHeaderInfo.codeIndex]) || `SIMPLE-${promotions.length + 1}`;
          const agency = normalizeCellText(row[dataHeaderInfo.agencyIndex]);
          if (!agency) return;

          const matched = findAgencySeedInfo(agency);
          const branchFromData = dataHeaderInfo.branchIndex >= 0
            ? normalizeBranchName(row[dataHeaderInfo.branchIndex])
            : "";
          const branchSeed = branchFromData || normalizeBranchName(matched?.branch || "") || "\uC804\uCCB4\uB300\uB9AC\uC810";
          const mapping = resolveOrgMapping(orgLookup, code, agency, branchSeed);
          const resolvedRegion = mapping.region || matched?.region || "\uC5C5\uB85C\uB4DC\uB300\uC0C1";
          const resolvedBranch = mapping.branch || branchSeed;
          const hasMetrics = row.some((cell, index) => (
            ![dataHeaderInfo.statusIndex, dataHeaderInfo.codeIndex, dataHeaderInfo.agencyIndex].includes(index)
            && normalizeCellText(cell)
          ));
          const status = normalizeUploadStatus(row[dataHeaderInfo.statusIndex], hasMetrics);
          const itemId = promotions.length + 1;
          const item = {
            id: itemId,
            code,
            agency: mapping.agency || agency || "\uC5C5\uB85C\uB4DC\uB300\uC0C1",
            region: resolvedRegion,
            branch: resolvedBranch,
            rm: matched?.rm || "\uBCF8\uC0AC\uB2F4\uB2F9\uC790",
            product: meta.targetProducts || matched?.product || "\uD504\uB85C\uBAA8\uC158",
            happyType: "",
            month: meta.month,
            status,
            errorReason: status === "\uBBF8\uD655\uC815"
              ? "\uD504\uB85C\uBAA8\uC158 \uC218\uCE58 \uB370\uC774\uD130 \uBBF8\uC785\uB825"
              : (status === "\uC624\uB958" ? "\uC5C5\uB85C\uB4DC \uB370\uC774\uD130 \uD655\uC778 \uD544\uC694" : ""),
            generated: false,
            updatedAt: getNowStamp(),
            noticeFile: `${agency}_\uC548\uB0B4\uC7A5.jpg`
          };

          promotions.push(item);

          if (status === "\uD655\uC815") {
            templateForms[itemId] = buildTemplateDataFromSimpleConfig(item, meta, blocks, noticeLines, rows);
          }
        });

        return {
          promotions,
          templateForms
        };
      }
